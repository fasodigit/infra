#
# GrowthBook feature-flag service (+ MongoDB persistent store).
# Usage (compose override) :
#   podman-compose -f INFRA/docker/compose/podman-compose.yml \
#                  -f INFRA/growthbook/podman-compose.growthbook.yml up -d
#
# Port choisi : 3100 (évite la collision avec Grafana sur 3000).
# Secrets (JWT_SECRET, ENCRYPTION_KEY, GROWTHBOOK_API_KEY) injectés via Vault
# Agent (kv faso/growthbook/*) — cf. INFRA/vault/scripts/seed-secrets.sh.
name: faso-growthbook

services:
  faso-growthbook-mongo:
    image: mongo:7
    container_name: faso-growthbook-mongo
    restart: unless-stopped
    volumes:
      - faso-growthbook-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks: [faso-net]

  faso-growthbook:
    image: growthbook/growthbook:latest
    container_name: faso-growthbook
    restart: unless-stopped
    depends_on:
      faso-growthbook-mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://faso-growthbook-mongo:27017/growthbook
      APP_ORIGIN: ${GROWTHBOOK_APP_ORIGIN:-http://localhost:3100}
      API_HOST:   ${GROWTHBOOK_API_HOST:-http://localhost:3100}
      NODE_ENV:   production
      # Injectés depuis Vault par podman-compose (envsubst) : kv faso/growthbook/*
      JWT_SECRET:        ${GROWTHBOOK_JWT_SECRET:?JWT_SECRET manquant (vault kv get faso/growthbook/jwt)}
      ENCRYPTION_KEY:    ${GROWTHBOOK_ENCRYPTION_KEY:?ENCRYPTION_KEY manquant}
      # Optionnel : clef d'accès admin auto-provisionnée au premier démarrage
      GROWTHBOOK_API_KEY: ${GROWTHBOOK_API_KEY:-}
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    volumes:
      - faso-growthbook-uploads:/usr/local/src/app/packages/back-end/uploads
    networks: [faso-net]

volumes:
  faso-growthbook-mongo-data:
  faso-growthbook-uploads:

networks:
  faso-net:
    external: true
