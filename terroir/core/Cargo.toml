# SPDX-License-Identifier: AGPL-3.0-or-later
# terroir-core — Service principal (registre membres, parcelles, ménages)
# HTTP :8830 + gRPC :8730

[package]
name = "terroir-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
build = "build.rs"

[lib]
name = "terroir_core"
path = "src/lib.rs"

[[bin]]
name = "terroir-core"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
axum = { workspace = true }
tonic = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
sqlx = { workspace = true }
prost = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }
redis = { workspace = true }
yrs = { workspace = true }
geojson = { workspace = true }
jsonwebtoken = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }
tokio-stream = { workspace = true }
parking_lot = { workspace = true }

# Redpanda producer — feature-gated so dev without brokers still compiles
rdkafka = { workspace = true, optional = true }

[features]
# kafka feature is opt-in; in dev without librdkafka-dev installed, build without it.
default = []
kafka = ["dep:rdkafka"]

[build-dependencies]
tonic-build = { workspace = true }
