# SPDX-License-Identifier: AGPL-3.0-or-later
# terroir-eudr — Validation EUDR (Hansen GFC + JRC TMF) + génération DDS
# HTTP :8831 + gRPC :8731

[package]
name = "terroir-eudr"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
build = "build.rs"

[lib]
name = "terroir_eudr"
path = "src/lib.rs"

[[bin]]
name = "terroir-eudr"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
axum = { workspace = true }
tonic = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
sqlx = { workspace = true }
prost = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }
redis = { workspace = true }
geojson = { workspace = true }
jsonwebtoken = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
aws-sdk-s3 = { workspace = true }
aws-config = { workspace = true }
aws-credential-types = { workspace = true }
aws-smithy-types = { workspace = true }
tiff = { workspace = true }
geo = { workspace = true }
printpdf = { workspace = true }
backoff = { workspace = true }
lru = { workspace = true }

# Redpanda producer — feature-gated so dev without brokers still compiles
rdkafka = { workspace = true, optional = true }

[features]
# kafka feature is opt-in; in dev without librdkafka-dev installed, build without it.
default = []
kafka = ["dep:rdkafka"]

[build-dependencies]
tonic-build = { workspace = true }
