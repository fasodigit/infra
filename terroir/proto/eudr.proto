syntax = "proto3";

package terroir.eudr.v1;

// EudrService — validation parcelles vs Hansen GFC + JRC TMF, génération DDS.
service EudrService {
  rpc Health(HealthRequest) returns (HealthReply);
}

message HealthRequest {}

message HealthReply {
  string status = 1;
  string version = 2;
}
