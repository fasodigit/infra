spring:
  graphql:
    graphiql:
      enabled: true

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  # Dev-mode Flyway: clean is ALWAYS disabled (use dev-reset profile to wipe schema)
  flyway:
    clean-disabled: true

  datasource:
    password: ${DB_PASSWORD}

auth:
  jwks-uri: http://localhost:8801/.well-known/jwks.json

logging:
  level:
    bf.gov.faso.poulets: DEBUG
    org.springframework.security: DEBUG
    io.grpc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoint:
    health:
      show-details: always
