server:
  port: 8901
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 25MB
    max-swallow-size: 25MB
  max-http-request-header-size: 16KB

spring:
  application:
    name: poulets-api
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/poulets_db
    username: ${DB_USER:poulets_api}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000
      validation-timeout: 3000
      leak-detection-threshold: 30000
      data-source-properties:
        options: "-c statement_timeout=10000"

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      jakarta:
        persistence:
          query:
            timeout: 5000
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 25
        default_batch_fetch_size: 16

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true        # CRITICAL: prevents flyway:clean in prod

  # KAYA (Redis-compatible) on port 6380
  data:
    redis:
      host: ${KAYA_HOST:localhost}
      port: ${KAYA_PORT:6380}
      password: ${KAYA_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # Input validation & request size limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  # GraphQL (DGS)
  graphql:
    path: /graphql
    graphiql:
      enabled: true
    introspection:
      enabled: ${GRAPHQL_INTROSPECTION:false}
    schema:
      locations: classpath:schema/

# gRPC server
grpc:
  server:
    port: 9901
    security:
      enabled: true
      certificate-chain: ${GRPC_TLS_CERT_CHAIN:classpath:tls/server.crt}
      private-key: ${GRPC_TLS_PRIVATE_KEY:classpath:tls/server.key}

# Auth / JWT
auth:
  jwks-uri: ${AUTH_JWKS_URI:http://localhost:8801/.well-known/jwks.json}

# Cache configuration
cache:
  poulet:
    ttl-days: 21
    wb-flush-interval-seconds: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      authMs:
        baseConfig: default
      kaya:
        baseConfig: default
        slidingWindowSize: 20
        waitDurationInOpenState: 10s

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      authMs:
        timeoutDuration: 3s
      kaya:
        timeoutDuration: 1s

  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 500ms

  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
    instances:
      kaya:
        maxAttempts: 3
        waitDuration: 200ms

logging:
  level:
    bf.gov.faso.poulets: INFO
    org.springframework.security: WARN
    io.grpc: WARN
