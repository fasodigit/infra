server:
  port: 8901
  shutdown: graceful

spring:
  application:
    name: poulets-api
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/poulets_db
    username: ${DB_USER:poulets_api}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true        # CRITICAL: prevents flyway:clean in prod

  # KAYA (Redis-compatible) on port 6380
  data:
    redis:
      host: ${KAYA_HOST:localhost}
      port: ${KAYA_PORT:6380}
      password: ${KAYA_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # GraphQL (DGS)
  graphql:
    path: /graphql
    graphiql:
      enabled: true
    schema:
      locations: classpath:schema/

# gRPC server
grpc:
  server:
    port: 9901
    security:
      enabled: true
      certificate-chain: ${GRPC_TLS_CERT_CHAIN:classpath:tls/server.crt}
      private-key: ${GRPC_TLS_PRIVATE_KEY:classpath:tls/server.key}

# Auth / JWT
auth:
  jwks-uri: ${AUTH_JWKS_URI:http://localhost:8801/.well-known/jwks.json}

# Cache configuration
cache:
  poulet:
    ttl-days: 21
    wb-flush-interval-seconds: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    bf.gov.faso.poulets: INFO
    org.springframework.security: WARN
    io.grpc: WARN
