# SPDX-License-Identifier: AGPL-3.0
# FASO DIGITALISATION — semantic-release configuration
# Conventional Commits → auto tag + changelog + GitHub Release

tagFormat: "v${version}"

branches:
  - name: main
  - name: beta
    prerelease: true
  - name: alpha
    prerelease: true

plugins:
  # 1. Analyze conventional commits
  - - "@semantic-release/commit-analyzer"
    - preset: "conventionalcommits"
      releaseRules:
        - type: "feat"
          release: "minor"
        - type: "fix"
          release: "patch"
        - type: "perf"
          release: "patch"
        - type: "revert"
          release: "patch"
        - type: "docs"
          release: false
        - type: "style"
          release: false
        - type: "chore"
          release: false
        - type: "refactor"
          release: false
        - type: "test"
          release: false
        - type: "build"
          release: false
        - type: "ci"
          release: false
        - breaking: true
          release: "major"

  # 2. Generate release notes
  - - "@semantic-release/release-notes-generator"
    - preset: "conventionalcommits"
      presetConfig:
        types:
          - type: "feat"
            section: "Features"
          - type: "fix"
            section: "Bug Fixes"
          - type: "perf"
            section: "Performance Improvements"
          - type: "revert"
            section: "Reverts"
          - type: "docs"
            section: "Documentation"
            hidden: false
          - type: "style"
            hidden: true
          - type: "chore"
            hidden: true
          - type: "refactor"
            section: "Code Refactoring"
            hidden: false
          - type: "test"
            hidden: true
          - type: "build"
            section: "Build System"
            hidden: false
          - type: "ci"
            hidden: true
      writerOpts:
        headerPartial: |
          ## {{version}} ({{date}})

          > FASO DIGITALISATION — Licensed under AGPL-3.0
          > Breaking changes require migration — see RELEASE.md

  # 3. Update CHANGELOG.md
  - - "@semantic-release/changelog"
    - changelogFile: "CHANGELOG.md"
      changelogTitle: |
        # Changelog

        <!-- AGPL-3.0 — FASO DIGITALISATION -->
        <!-- All versions listed below were automatically generated by semantic-release -->
        <!-- NEVER manually delete published tags or entries -->

  # 4. Bump versions across all packages
  - - "@semantic-release/exec"
    - prepareCmd: |
        export NEXT_VERSION=${nextRelease.version}
        bash scripts/bump-versions.sh
        bash scripts/bump-java-versions.sh
        bash scripts/bump-node-versions.sh

  # 5. Commit updated files back
  - - "@semantic-release/git"
    - assets:
        - "CHANGELOG.md"
        - "kaya/Cargo.toml"
        - "armageddon/Cargo.toml"
        - "auth-ms/pom.xml"
        - "poulets-platform/backend/pom.xml"
        - "poulets-platform/bff/package.json"
        - "poulets-platform/frontend/package.json"
      message: "chore(release): v${nextRelease.version} [skip ci]\n\nSPDX-License-Identifier: AGPL-3.0"

  # 6. Create GitHub Release
  - - "@semantic-release/github"
    - successComment: |
        This PR is included in version **v${nextRelease.version}** :tada:

        Released under [AGPL-3.0](https://www.gnu.org/licenses/agpl-3.0.html) — FASO DIGITALISATION
      failTitle: "Release v${nextRelease.version} failed"
      labels:
        - "released"
      releasedLabels:
        - "released on @${nextRelease.channel}"
