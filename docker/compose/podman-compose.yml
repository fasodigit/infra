# =============================================================================
# Podman Compose - FASO DIGITALISATION - Full Ecosystem
# =============================================================================
# Infrastructure:
#   - KAYA (in-memory DB)     : 6380
#   - PostgreSQL 17           : 5432
#
# Observability:
#   - Jaeger (Tracing)        : 16686 (UI), 4317 (OTLP gRPC), 4318 (OTLP HTTP)
#
# Security (ORY):
#   - Kratos (Identity)       : 4433 (public), 127.0.0.1:4434 (admin - loopback only)
#   - Keto (Authorization)    : 4466 (read), 127.0.0.1:4467 (write - loopback only)
#
# Gateway:
#   - ARMAGEDDON              : 8080
#
# Message Bus:
#   - Redpanda                : 19092 (Kafka external), 18082 (Pandaproxy), 8090 (Console UI)
#
# Backend:
#   - auth-ms                 : 8801 (HTTP), 9801 (gRPC)
#   - poulets-api             : 8901 (HTTP), 9901 (gRPC)
#   - notifier-ms             : 8803 (HTTP), 9090 (Actuator/Prometheus)
#
# Mail (dev):
#   - MailHog                 : 1025 (SMTP), 8025 (Web UI)
#
# Frontend:
#   - poulets-bff (Next.js)   : 4800
#   - poulets-frontend (Angular) : 4801
#
# Secrets: run scripts/init-secrets.sh before first start
# =============================================================================

name: faso-digitalisation

# =============================================================================
# Secrets (external files, never committed - see secrets/.gitignore)
# Run: scripts/init-secrets.sh to generate
# =============================================================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  kratos_cookie_secret:
    file: ./secrets/kratos_cookie_secret.txt
  kratos_cipher_secret:
    file: ./secrets/kratos_cipher_secret.txt
  keto_secret:
    file: ./secrets/keto_secret.txt

services:
  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Redpanda - Kafka-compatible message bus (sovereign, no ZooKeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.io/redpandadata/redpanda:v24.3.4
    container_name: faso-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"  # External Kafka API
      - "18082:18082"  # Pandaproxy
      - "18081:18081"  # Schema Registry
      - "9644:9644"    # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=redpanda:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - faso-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda Console - Kafka topic management UI
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: docker.io/redpandadata/console:v2.7.2
    container_name: faso-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
    networks:
      - faso-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # KAYA - In-Memory Database (sovereign Redis replacement)
  # Built from INFRA/kaya Rust workspace (23 crates, RESP3 + gRPC + Prometheus)
  # ---------------------------------------------------------------------------
  kaya:
    build:
      context: ../..
      dockerfile: docker/images/Containerfile.kaya
    image: faso/kaya:dev
    container_name: faso-kaya
    ports:
      - "127.0.0.1:6380:6379"   # RESP3 (Redis-compatible protocol)
      - "127.0.0.1:6381:6381"   # gRPC API
      - "127.0.0.1:9100:9100"   # Prometheus metrics
    environment:
      RUST_LOG: "info,kaya=debug"
      KAYA_BIND: "0.0.0.0"
    volumes:
      - kaya-data:/var/lib/kaya
    healthcheck:
      test: ["CMD", "/usr/local/bin/kaya-cli", "--port", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - faso-network
      - admin-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger - Distributed Tracing
  # TODO: pin digest via docker manifest inspect jaegertracing/all-in-one:1.58
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: faso-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # gRPC collector
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # Compact thrift
    networks:
      - faso-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 - Primary relational database
  # TODO: pin digest via docker manifest inspect postgres:17-alpine
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: faso-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: faso
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: faso_main
      POSTGRES_MULTIPLE_DATABASES: "kratos,keto,auth,poulets"
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faso -d faso_main"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - faso-network
      - admin-network
    restart: unless-stopped

  # ===========================================================================
  # SECURITY - ORY STACK
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Kratos Database Migration (one-shot)
  # TODO: pin digest via docker manifest inspect oryd/kratos:v1.3.1
  # ---------------------------------------------------------------------------
  kratos-migrate:
    image: oryd/kratos:v1.3.1
    container_name: faso-kratos-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate sql -e --yes
    environment:
      DSN: postgres://faso@postgres:5432/kratos?sslmode=disable
    secrets:
      - postgres_password
    volumes:
      - ../../ory/kratos/config:/etc/config/kratos:ro
      - ../../ory/kratos/schemas:/etc/config/kratos-schemas:ro
    networks:
      - admin-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Kratos - Identity Management
  # TODO: pin digest via docker manifest inspect oryd/kratos:v1.3.1
  # ---------------------------------------------------------------------------
  kratos:
    image: oryd/kratos:v1.3.1
    container_name: faso-kratos
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    command: serve --config /etc/config/kratos/kratos.yml --dev --watch-courier
    ports:
      - "4433:4433"
      - "127.0.0.1:4434:4434"   # Admin: loopback only
    environment:
      DSN: postgres://faso@postgres:5432/kratos?sslmode=disable
      SERVE_PUBLIC_BASE_URL: http://localhost:4433/
      SERVE_ADMIN_BASE_URL: http://localhost:4434/
      COURIER_SMTP_CONNECTION_URI: smtp://mailslurper:1025/?disable_starttls=true
      LOG_LEVEL: debug
      SECRETS_COOKIE_FILE: /run/secrets/kratos_cookie_secret
      SECRETS_CIPHER_FILE: /run/secrets/kratos_cipher_secret
    secrets:
      - postgres_password
      - kratos_cookie_secret
      - kratos_cipher_secret
    volumes:
      - ../../ory/kratos/config:/etc/config/kratos:ro
      - ../../ory/kratos/schemas:/etc/config/kratos-schemas:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4433/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - faso-network
      - admin-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keto Database Migration (one-shot)
  # TODO: pin digest via docker manifest inspect oryd/keto:v0.12.0
  # ---------------------------------------------------------------------------
  keto-migrate:
    image: oryd/keto:v0.12.0
    container_name: faso-keto-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate up --yes --config /etc/config/keto/keto.yml
    environment:
      DSN: postgres://faso@postgres:5432/keto?sslmode=disable
    secrets:
      - postgres_password
    volumes:
      - ../../ory/keto/config:/etc/config/keto:ro
    networks:
      - admin-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Keto - Authorization / Permissions
  # TODO: pin digest via docker manifest inspect oryd/keto:v0.12.0
  # ---------------------------------------------------------------------------
  keto:
    image: oryd/keto:v0.12.0
    container_name: faso-keto
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
    command: serve --config /etc/config/keto/keto.yml
    ports:
      - "4466:4466"
      - "127.0.0.1:4467:4467"   # Write API: loopback only
    environment:
      DSN: postgres://faso@postgres:5432/keto?sslmode=disable
      LOG_LEVEL: debug
    secrets:
      - postgres_password
    volumes:
      - ../../ory/keto/config:/etc/config/keto:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4466/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - faso-network
      - admin-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MailSlurper - Dev email testing
  # Pin to immutable tag - latest-smtps is mutable
  # TODO: pin digest via docker manifest inspect oryd/mailslurper:latest-smtps
  # ---------------------------------------------------------------------------
  mailslurper:
    image: oryd/mailslurper:latest-smtps
    container_name: faso-mailslurper
    ports:
      - "4436:4436"
      - "4437:4437"
      - "1025:1025"
    networks:
      - faso-network
    restart: unless-stopped

  # ===========================================================================
  # GATEWAY
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # ARMAGEDDON - API Gateway
  # ---------------------------------------------------------------------------
  armageddon:
    build:
      context: ../..
      dockerfile: docker/images/Containerfile.armageddon
    container_name: faso-armageddon
    depends_on:
      kratos:
        condition: service_healthy
      kaya:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9090:9090"
    environment:
      ARMAGEDDON_BIND: "0.0.0.0"
      ARMAGEDDON_PORT: "8080"
      ARMAGEDDON_TLS_PORT: "8443"
      ARMAGEDDON_ADMIN_PORT: "9090"
      ARMAGEDDON_LOG_LEVEL: "info"
      ARMAGEDDON_KAYA_URL: "redis://kaya:6379"
      ARMAGEDDON_KETO_READ_URL: "http://keto:4466"
      ARMAGEDDON_AUTH_MODE: "session"
      ARMAGEDDON_KRATOS_PUBLIC_URL: "http://kratos:4433"
    volumes:
      - ../../armageddon/config:/etc/armageddon:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - faso-network
    restart: unless-stopped

  # ===========================================================================
  # BACKEND SERVICES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # auth-ms - Authentication Microservice (Spring Boot)
  # ---------------------------------------------------------------------------
  auth-ms:
    build:
      context: ../..
      dockerfile: docker/images/Containerfile.auth-ms
    container_name: faso-auth-ms
    depends_on:
      postgres:
        condition: service_healthy
      kaya:
        condition: service_healthy
      kratos:
        condition: service_healthy
    ports:
      - "8801:8801"
      - "9801:9801"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8801"
      GRPC_SERVER_PORT: "9801"
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: faso
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/postgres_password
      # KAYA (Redis-compatible)
      SPRING_DATA_REDIS_HOST: kaya
      SPRING_DATA_REDIS_PORT: "6379"
      # Kratos integration
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      # Keto integration
      KETO_READ_URL: http://keto:4466
      KETO_WRITE_URL: http://keto:4467
      # Jaeger tracing (OTLP)
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8801/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - faso-network
      - admin-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # poulets-api - Poulets Domain API (Spring Boot)
  # ---------------------------------------------------------------------------
  poulets-api:
    build:
      context: ../..
      dockerfile: docker/images/Containerfile.poulets-api
    container_name: faso-poulets-api
    depends_on:
      postgres:
        condition: service_healthy
      kaya:
        condition: service_healthy
      auth-ms:
        condition: service_healthy
    ports:
      - "8901:8901"
      - "9901:9901"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8901"
      GRPC_SERVER_PORT: "9901"
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/poulets
      SPRING_DATASOURCE_USERNAME: faso
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/postgres_password
      # KAYA (Redis-compatible)
      SPRING_DATA_REDIS_HOST: kaya
      SPRING_DATA_REDIS_PORT: "6379"
      # Auth service
      AUTH_MS_URL: http://auth-ms:8801
      AUTH_MS_GRPC: auth-ms:9801
      # Kratos for session validation
      KRATOS_PUBLIC_URL: http://kratos:4433
      # Jaeger tracing (OTLP)
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8901/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - faso-network
    restart: unless-stopped

  # ===========================================================================
  # FRONTEND
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # poulets-bff - Next.js Backend-For-Frontend
  # ---------------------------------------------------------------------------
  poulets-bff:
    build:
      context: ../..
      dockerfile: poulets-platform/bff/Containerfile
    container_name: faso-poulets-bff
    depends_on:
      poulets-api:
        condition: service_healthy
      kratos:
        condition: service_healthy
    ports:
      - "4800:4800"
    environment:
      NODE_ENV: production
      PORT: "4800"
      # Backend services
      POULETS_API_URL: http://poulets-api:8901
      POULETS_API_GRAPHQL: http://poulets-api:8901/graphql
      AUTH_MS_URL: http://auth-ms:8801
      # Kratos for session management
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      # KAYA for BFF-level caching
      KAYA_URL: redis://kaya:6379
      # Frontend URL (CORS)
      FRONTEND_URL: http://localhost:4801
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4800/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - faso-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # notifier-ms - Notification Microservice (Redpanda events → SMTP)
  # ---------------------------------------------------------------------------
  notifier-ms:
    build:
      context: ../..
      dockerfile: notifier-ms/Containerfile
    container_name: faso-notifier-ms
    depends_on:
      postgres:
        condition: service_healthy
      kaya:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8803:8803"   # HTTP API
      - "9090:9090"   # Actuator / Prometheus
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: notifier
      POSTGRES_USER: notifier
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      KAFKA_BROKERS: redpanda:9092
      KAYA_URL: redis://kaya:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      MAIL_FROM: noreply@faso.gov.bf
      MAIL_FROM_NAME: "FASO DIGITALISATION"
      AUTH_MS_JWKS_URI: http://auth-ms:8801/.well-known/jwks.json
      FASO_ENV: dev
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8803/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - faso-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MailHog - SMTP dev server (dev only)
  # ---------------------------------------------------------------------------
  mailhog:
    image: docker.io/mailhog/mailhog:v1.0.1
    container_name: faso-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - faso-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # poulets-frontend - Angular 21 SPA
  # ---------------------------------------------------------------------------
  poulets-frontend:
    build:
      context: ../..
      dockerfile: docker/images/Containerfile.poulets-frontend
    container_name: faso-poulets-frontend
    depends_on:
      poulets-bff:
        condition: service_healthy
    ports:
      - "4801:80"
    environment:
      BFF_URL: http://poulets-bff:4800
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - faso-network
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
    name: faso-postgres-data
  kaya-data:
    driver: local
    name: faso-kaya-data

# =============================================================================
# Networks
# =============================================================================
networks:
  faso-network:
    name: faso-network
    driver: bridge
  # Isolated network for admin APIs (Kratos admin, Keto write, DB)
  # Only internal services join this network - no public exposure
  admin-network:
    name: faso-admin-network
    driver: bridge
    internal: true
