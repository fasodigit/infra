; pgbouncer-terroir.ini — pgbouncer configuration for TERROIR multi-tenant pool.
;
; Transaction pooling is mandatory for schema-per-tenant with RLS:
;   - No prepared statements (incompatible with pgbouncer transaction mode).
;   - sqlx: configure with ?statement_cache_capacity=0
;   - SET LOCAL (not SET) for app.current_tenant_slug per transaction.
;
; Target: 20k+ tenant schemas on a single PG cluster.
; Each tenant connection sets search_path to its schema at the application
; level (not via pgbouncer); pgbouncer rejects client-supplied search_path.
;
; References:
;   ADR-006 §Security — "SET search_path côté serveur uniquement"
;   ULTRAPLAN P0.3 — pgbouncer config: transaction pooling, prepared stmts OFF

[databases]
; faso_terroir maps to the shared postgres database.
; terroir_t_<slug> schemas all live in the same PG database.
; The application selects the schema via SET LOCAL search_path per tx.
faso_terroir = host=postgres port=5432 dbname=postgres pool_size=20

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; CRITICAL: transaction mode required for schema-per-tenant + RLS.
; session mode would allow clients to persist SET search_path across connections,
; which breaks connection reuse (ADR-006 §Security).
pool_mode = transaction

; Allow up to 5000 simultaneous client connections (20k tenants × sparse active).
max_client_conn = 5000
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 3

; Prevent idle server connections from aging out.
server_lifetime = 3600
server_idle_timeout = 600

; extra_float_digits and options are set by some PG drivers at startup;
; ignoring them prevents "unsupported startup parameter" errors.
ignore_startup_parameters = extra_float_digits,options

; Logging — helpful for debugging connection leaks at scale.
log_disconnections = 1
log_pooler_errors = 1
