spring:
  datasource:
    password: ${AUTH_MS_DB_PASSWORD:?AUTH_MS_DB_PASSWORD must be set in production}

  graphql:
    graphiql:
      enabled: false
    introspection:
      enabled: false

  flyway:
    clean-disabled: true

management:
  server:
    port: 9090
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    bf.gov.faso.auth: INFO
    org.springframework.security: WARN
    io.grpc: WARN
