server:
  port: 8801
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 25MB
    max-swallow-size: 25MB
  max-http-request-header-size: 16KB

spring:
  application:
    name: auth-ms
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # PostgreSQL 17
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_ms
    username: auth_ms
    password: ${AUTH_MS_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000
      validation-timeout: 3000
      leak-detection-threshold: 30000
      data-source-properties:
        options: "-c statement_timeout=10000"

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      jakarta:
        persistence:
          query:
            timeout: 5000
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 25
        default_batch_fetch_size: 16

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true        # CRITICAL: prevents flyway:clean in prod

  # KAYA (Redis-compatible) on port 6380
  data:
    redis:
      host: ${KAYA_HOST:localhost}
      port: ${KAYA_PORT:6380}
      password: ${KAYA_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # Input validation & request size limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  # GraphQL (DGS)
  graphql:
    path: /graphql
    graphiql:
      enabled: false
    introspection:
      enabled: ${GRAPHQL_INTROSPECTION:false}
    schema:
      locations: classpath:schema/

# gRPC server
grpc:
  server:
    port: 9801
    security:
      enabled: true
      # When spiffe.enabled=true the cert-chain and private-key below are
      # superseded by the SVID delivered by the SPIRE agent.  They remain as
      # fallback for legacy TLS mode (spiffe.enabled=false).
      certificate-chain: ${GRPC_TLS_CERT_CHAIN:classpath:tls/server.crt}
      private-key: ${GRPC_TLS_PRIVATE_KEY:classpath:tls/server.key}

# SPIFFE / SPIRE workload-identity configuration.
# Set spiffe.enabled=true (and restart) to activate mTLS peer validation.
# When false (default), legacy GRPC_SERVICE_TOKEN bearer auth is used.
spiffe:
  enabled: ${SPIFFE_ENABLED:false}
  endpoint-socket: ${SPIFFE_ENDPOINT_SOCKET:unix:/run/spire/sockets/agent.sock}
  trust-domain: faso.gov.bf
  # Exhaustive list of SPIFFE IDs allowed to call this service over gRPC.
  # Add or remove entries here; restart is required (no hot-reload yet).
  authorized-peers:
    - spiffe://faso.gov.bf/ns/default/sa/armageddon
    - spiffe://faso.gov.bf/ns/default/sa/kaya

# Ory Kratos
kratos:
  public-url: ${KRATOS_PUBLIC_URL:http://localhost:4433}
  admin-url: ${KRATOS_ADMIN_URL:http://localhost:4434}
  timeout-ms: 5000

# Ory Keto
keto:
  read-url: ${KETO_READ_URL:http://localhost:4466}
  write-url: ${KETO_WRITE_URL:http://localhost:4467}
  timeout-ms: 5000

# Auth configuration
auth:
  jwt:
    algorithm: ES384
    rotation-days: 90
    issuer: https://auth.faso.gov.bf
    audience: faso-digitalisation
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  session:
    max-per-user: 3
  bruteforce:
    enabled: true
    # Graduated punishment thresholds
    thresholds:
      - fails: 5
        lock-minutes: 10
      - fails: 10
        lock-minutes: 30
      - fails: 15
        lock-minutes: 60
      - fails: 20
        lock-minutes: 360
      - fails: 25
        lock-minutes: 1440
      - fails: 30
        lock-minutes: 10080
      - fails: 35
        lock-minutes: -1  # permanent suspension
  password:
    expiration-days: 90
    notification-days-before:
      - 14
      - 7

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      kratos:
        baseConfig: default
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
      keto:
        baseConfig: default
      kaya:
        baseConfig: default
        slidingWindowSize: 20
        waitDurationInOpenState: 10s

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      kratos:
        timeoutDuration: 3s
      keto:
        timeoutDuration: 2s
      kaya:
        timeoutDuration: 1s

  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 500ms
    instances:
      kratos:
        maxConcurrentCalls: 15
      keto:
        maxConcurrentCalls: 10

  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
    instances:
      kratos:
        maxAttempts: 3
        waitDuration: 1s
      kaya:
        maxAttempts: 3
        waitDuration: 200ms

logging:
  level:
    bf.gov.faso.auth: INFO
    org.springframework.security: WARN
    io.grpc: WARN
