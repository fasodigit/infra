apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: faso-tempo-ds
    access: proxy
    # Tempo runs on its bridge; host-published on 127.0.0.1:3200.
    url: http://127.0.0.1:3200
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: faso-prometheus-ds
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: faso-loki-ds
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "1h"
      spanBar:
        type: "Tag"
        tag: "http.path"
    editable: false
    version: 2
