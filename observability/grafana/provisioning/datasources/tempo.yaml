apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: faso-tempo-ds
    access: proxy
    url: ${TEMPO_URL:-http://tempo:3200}
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: faso-prometheus-ds
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: faso-loki-ds
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "1h"
      spanBar:
        type: "Tag"
        tag: "http.path"
    editable: false
    version: 1
