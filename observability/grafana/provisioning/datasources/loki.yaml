apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: faso-loki-ds
    access: proxy
    # Loki runs on its bridge; host-published on 127.0.0.1:3100.
    url: http://127.0.0.1:3100
    isDefault: false
    jsonData:
      maxLines: 5000
      derivedFields:
        - datasourceUid: faso-tempo-ds
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View in Tempo"
        - datasourceUid: faso-tempo-ds
          matcherRegex: 'traceId=(\w+)'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View in Tempo"
    editable: false
    version: 2
