name: Grafana Dashboard Sync

on:
  push:
    branches:
      - main
    paths:
      - "observability/grafana/dashboards/*.json"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging | prod | both)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
          - both

concurrency:
  group: grafana-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Dashboard JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run dashboard tests
        run: |
          chmod +x observability/grafana/scripts/test-dashboards.sh
          ./observability/grafana/scripts/test-dashboards.sh observability/grafana/dashboards/

  sync-staging:
    name: Sync to Staging Grafana
    runs-on: ubuntu-latest
    needs: validate
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.environment == 'staging' || inputs.environment == 'both'))
    environment:
      name: staging
      url: ${{ vars.GRAFANA_STAGING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync dashboards to Staging
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_STAGING_TOKEN }}
          GRAFANA_URL: ${{ vars.GRAFANA_STAGING_URL }}
          GRAFANA_ORG_ID: "1"
        run: |
          chmod +x observability/grafana/scripts/sync-dashboards.sh
          ./observability/grafana/scripts/sync-dashboards.sh

      - name: Post sync summary
        if: always()
        run: |
          echo "### Grafana Staging Sync ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ vars.GRAFANA_STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  sync-prod:
    name: Sync to Production Grafana
    runs-on: ubuntu-latest
    needs: sync-staging
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'prod' || inputs.environment == 'both')
    environment:
      name: production
      url: ${{ vars.GRAFANA_PROD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync dashboards to Production
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_PROD_TOKEN }}
          GRAFANA_URL: ${{ vars.GRAFANA_PROD_URL }}
          GRAFANA_ORG_ID: "1"
        run: |
          chmod +x observability/grafana/scripts/sync-dashboards.sh
          ./observability/grafana/scripts/sync-dashboards.sh

      - name: Post sync summary
        if: always()
        run: |
          echo "### Grafana Production Sync ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ vars.GRAFANA_PROD_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
