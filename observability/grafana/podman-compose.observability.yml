version: "3.9"

# FASO DIGITALISATION — Observability Stack (dev override)
# Usage: docker compose -f docker-compose.yml -f observability/grafana/docker-compose.observability.yml up

x-common-labels: &common-labels
  labels:
    sovereignty: "faso-digitalisation"
    component: "observability"

networks:
  observability:
    name: faso-observability
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

services:
  # ──────────────────────────────────────────────────
  # Prometheus — metrics scraping & storage
  # ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: faso-prometheus
    restart: unless-stopped
    <<: *common-labels
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts/:/etc/prometheus/alerts/:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────
  # Loki — log aggregation
  # ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: faso-loki
    restart: unless-stopped
    <<: *common-labels
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────
  # Tempo — distributed tracing (OTel)
  # ──────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: faso-tempo
    restart: unless-stopped
    <<: *common-labels
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"    # Tempo HTTP API
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────
  # OpenTelemetry Collector — receives OTLP, fans out
  # ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: faso-otel-collector
    restart: unless-stopped
    <<: *common-labels
    command:
      - "--config=/etc/otel/config.yaml"
    volumes:
      - ./config/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4319:4317"    # OTLP gRPC (external facing — avoids clash with Tempo)
      - "4320:4318"    # OTLP HTTP (external facing)
      - "8889:8889"    # Prometheus exporter (collector self-metrics)
      - "13133:13133"  # Health check
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────
  # Grafana — visualization
  # ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: faso-grafana
    restart: unless-stopped
    <<: *common-labels
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-faso-dev-secret}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics,correlations"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      # Datasource env vars (read by provisioning templates)
      PROMETHEUS_URL: "http://prometheus:9090"
      LOKI_URL: "http://loki:3100"
      TEMPO_URL: "http://tempo:3200"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
