# Tempo configuration — 90-day trace retention with S3 archival.
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 2160h  # 90 days (up from 48h)
  ring:
    kvstore:
      store: consul

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: faso-dev
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: s3
    s3:
      bucket: faso-traces-archive
      endpoint: s3.gra.io.cloud.ovh.net
      region: gra
    block:
      bloom_filter_false_positive: 0.05
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
