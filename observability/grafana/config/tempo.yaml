# Tempo configuration — 90-day trace retention with sovereign S3 archival.
#
# Sovereignty (CLAUDE.md §3): trace data MUST land on a FASO-controlled S3
# endpoint (MinIO on sovereign infra). Override the defaults below at deploy
# time. NEVER point this at a foreign-jurisdiction cloud.
#
# Required env vars:
#   S3_ENDPOINT          minio.faso.svc:9000
#   S3_REGION            bf-ouaga-1 (cosmetic for MinIO)
#   S3_BUCKET_TRACES     faso-traces-archive
#   S3_ACCESS_KEY_FILE   /etc/faso-secrets/s3-access-key (Vault Agent rendered)
#   S3_SECRET_KEY_FILE   /etc/faso-secrets/s3-secret-key
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 2160h  # 90 days (up from 48h)
  ring:
    kvstore:
      store: consul
      consul:
        # Consul ring KV store for compactor coordination across replicas.
        # Defaults to in-cluster Consul service in K8s; override via env in dev.
        host: ${CONSUL_HOST:127.0.0.1:8500}
        consistent_reads: true
        watch_rate_limit: 1
        watch_burst_size: 1

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: faso-dev
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: s3
    s3:
      bucket: ${S3_BUCKET_TRACES:-faso-traces-archive}
      endpoint: ${S3_ENDPOINT:-minio.faso-observability.svc:9000}
      region: ${S3_REGION:-bf-ouaga-1}
      insecure: ${S3_INSECURE:-true}
      access_key: ${S3_ACCESS_KEY:-${file:/etc/faso-secrets/s3-access-key}}
      secret_key: ${S3_SECRET_KEY:-${file:/etc/faso-secrets/s3-secret-key}}
      forcepathstyle: true
    block:
      bloom_filter_false_positive: 0.05
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
