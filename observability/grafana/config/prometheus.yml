# Prometheus configuration — Thanos-compatible with external labels.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "bf-ouaga-1"
    sovereignty: "faso-digitalisation"
    replica: "$(POD_NAME)"

# Local retention at 15d — Thanos handles long-term via sidecar upload.
# min/max-block-duration = 2h required for Thanos sidecar.
# (Set via CLI flags in podman-compose.observability.yml)

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ───────────────────────────────────────────────────────────
# Rule files — SLO burn-rate + infrastructure + Pingora + SPIRE
# ───────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # ───────────────────────────────────────────────────────────
  # OTel Collector — spanmetrics + self-metrics
  # ───────────────────────────────────────────────────────────
  - job_name: otel-collector
    static_configs:
      - targets: ["127.0.0.1:8889"]

  # ───────────────────────────────────────────────────────────
  # Java microservices — Prometheus runs on host network, so
  # the Spring Boot actuator ports are reachable on localhost.
  # ───────────────────────────────────────────────────────────
  - job_name: auth-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8801"]

  - job_name: poulets-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8901"]

  - job_name: notifier-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8803"]

  # ───────────────────────────────────────────────────────────
  # Rust / Sovereign infra — host-mapped ports via Docker
  # ───────────────────────────────────────────────────────────
  - job_name: kaya
    static_configs:
      - targets: ["127.0.0.1:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: kaya

  # ───────────────────────────────────────────────────────────
  # ARMAGEDDON gateway (Pingora)
  # ───────────────────────────────────────────────────────────
  - job_name: armageddon
    static_configs:
      - targets: ["127.0.0.1:9900"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: armageddon
