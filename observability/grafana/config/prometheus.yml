global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "faso-dev"
    sovereignty: "faso-digitalisation"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # ───────────────────────────────────────────────────────────
  # Java microservices — Prometheus runs on host network, so
  # the Spring Boot actuator ports are reachable on localhost.
  # ───────────────────────────────────────────────────────────
  - job_name: auth-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8801"]

  - job_name: poulets-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8901"]

  - job_name: notifier-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8803"]

  # ───────────────────────────────────────────────────────────
  # Rust / Sovereign infra — host-mapped ports via Docker
  # ───────────────────────────────────────────────────────────
  - job_name: kaya
    static_configs:
      - targets: ["127.0.0.1:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: kaya
