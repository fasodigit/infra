# Thanos sidecar config — sovereign S3 (MinIO) bucket for long-term Prometheus
# block upload. CLAUDE.md §3: foreign clouds (OVH, AWS public) NOT acceptable.
#
# Required env vars (rendered by Vault Agent / ExternalSecret):
#   S3_ENDPOINT      minio.faso-observability.svc:9000
#   S3_REGION        bf-ouaga-1
#   S3_BUCKET_METRICS faso-metrics-archive
#   S3_ACCESS_KEY    via Vault kv-v2 path faso/observability/s3
#   S3_SECRET_KEY    via Vault kv-v2 path faso/observability/s3
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-sidecar-config
  namespace: faso-observability
data:
  bucket.yaml: |
    type: S3
    config:
      bucket: ${S3_BUCKET_METRICS:-faso-metrics-archive}
      endpoint: ${S3_ENDPOINT:-minio.faso-observability.svc:9000}
      region: ${S3_REGION:-bf-ouaga-1}
      insecure: ${S3_INSECURE:-true}
      signature_version2: false
      access_key: ${S3_ACCESS_KEY}
      secret_key: ${S3_SECRET_KEY}
      bucket_lookup_type: path
