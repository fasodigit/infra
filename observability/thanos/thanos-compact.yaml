# Thanos Compactor — downsampling + retention policy for long-term metrics.
#
# Downsample after 30 days: 5m resolution
# Downsample after 90 days: 1h resolution
# Retention: 13 months (full annual SLO cycle)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-compact
  namespace: faso-observability
  labels:
    app.kubernetes.io/name: thanos-compact
    sovereignty: faso-digitalisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-compact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-compact
    spec:
      containers:
        - name: thanos-compact
          image: quay.io/thanos/thanos:v0.35.0
          args:
            - compact
            - --data-dir=/data/thanos-compact
            - --objstore.config-file=/etc/thanos/bucket.yaml
            - --retention.resolution-raw=30d
            - --retention.resolution-5m=90d
            - --retention.resolution-1h=395d
            - --wait
            - --compact.concurrency=4
          volumeMounts:
            - name: thanos-bucket-config
              mountPath: /etc/thanos
              readOnly: true
            - name: compact-data
              mountPath: /data/thanos-compact
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: thanos-bucket-config
          configMap:
            name: thanos-sidecar-config
        - name: compact-data
          emptyDir:
            sizeLimit: 10Gi
