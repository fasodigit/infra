#
# Alertmanager receivers & routing — Phase 7 axe 19 (Postmortem auto).
# Route `severity: critical` + `team: sre` vers postmortem-bot + PagerDuty.
# Route `severity: warning` vers Slack SRE.
# Inhibit rules : SpireAgentDown masque SpireSvidExpiring*.
---
global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack_webhook_url
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

route:
  group_by: ['alertname', 'service', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    # Critical SRE incidents: postmortem-bot + PagerDuty
    - matchers:
        - severity = "critical"
        - team = "sre"
      receiver: postmortem-bot-webhook
      continue: true
      group_wait: 10s
    - matchers:
        - severity = "critical"
        - team = "sre"
      receiver: pagerduty-sre
      continue: false

    # Any other critical: Slack critical channel
    - matchers:
        - severity = "critical"
      receiver: slack-sre
      continue: false

    # Warnings: Slack SRE only
    - matchers:
        - severity = "warning"
      receiver: slack-sre

inhibit_rules:
  # If the SPIRE agent itself is down, do not page about SVIDs expiring
  - source_matchers:
      - alertname = "SpireAgentDown"
    target_matchers:
      - alertname =~ "SpireSvidExpiring.*"
    equal: [instance, cluster]

  # If a service is down entirely, mute latency/error alerts on it
  - source_matchers:
      - alertname = "ServiceDown"
    target_matchers:
      - alertname =~ "(HighLatency|HighErrorRate)"
    equal: [service, cluster]

receivers:
  - name: postmortem-bot-webhook
    webhook_configs:
      - url: http://postmortem-bot:8090/alert
        send_resolved: false
        max_alerts: 0
        http_config:
          follow_redirects: false

  - name: pagerduty-sre
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty_routing_key
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonLabels.alertname }} on {{ .CommonLabels.service }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          runbook: '{{ (index .Alerts 0).Annotations.runbook_url }}'

  - name: slack-sre
    slack_configs:
      - channel: '#faso-sre'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: slack-default
    slack_configs:
      - channel: '#faso-alerts'
        send_resolved: true
