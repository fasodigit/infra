# SPDX-License-Identifier: AGPL-3.0-or-later
# Coraza WAF — FASO DIGITALISATION inline configuration
#
# Loaded by armageddon-forge `waf` filter (Coraza-WASM via wasm_adapter).
# Paranoia level 1 = critical rules only (low false-positive rate).

# ──────────────────────────────────────────────────────────────────────
# Engine settings
# ──────────────────────────────────────────────────────────────────────
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecResponseBodyLimit 524288

SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# ──────────────────────────────────────────────────────────────────────
# OWASP CRS v4 setup (paranoia level 1)
# ──────────────────────────────────────────────────────────────────────
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=1"
SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=5"
SecAction "id:900120,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=4"

# Include CRS — starter pack: 30 critical rules covering OWASP Top 10
Include /etc/coraza/crs/crs-setup.conf
Include /etc/coraza/crs/rules/REQUEST-901-INITIALIZATION.conf
Include /etc/coraza/crs/rules/REQUEST-905-COMMON-EXCEPTIONS.conf
Include /etc/coraza/crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /etc/coraza/crs/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /etc/coraza/crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /etc/coraza/crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /etc/coraza/crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /etc/coraza/crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /etc/coraza/crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /etc/coraza/crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /etc/coraza/crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /etc/coraza/crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /etc/coraza/crs/rules/REQUEST-949-BLOCKING-EVALUATION.conf

# ──────────────────────────────────────────────────────────────────────
# FASO custom rules (id range 100000-199999)
# ──────────────────────────────────────────────────────────────────────

# Allowlist health/metrics (no WAF inspection)
SecRule REQUEST_URI "@rx ^/(health|metrics|admin/metrics|\.well-known/.*|favicon\.ico)$" \
  "id:100001,phase:1,nolog,allow,ctl:ruleEngine=Off"

# Block known scanners
SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/coraza/scanners.txt" \
  "id:100002,phase:1,deny,status:403,log,msg:'FASO: scanner detected (UA)'"

# Block SSRF to private CIDRs (A10)
SecRule ARGS "@rx (?i)https?://(127\.|0\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|169\.254\.169\.254)" \
  "id:100010,phase:2,deny,status:403,log,msg:'FASO: SSRF private CIDR (A10)'"

# Cap upload size for /api/profile/avatar
SecRule REQUEST_URI "^/api/profile/avatar" \
  "id:100020,phase:1,chain,pass,nolog"
  SecRule REQUEST_HEADERS:Content-Length "@gt 5242880" \
    "deny,status:413,msg:'FASO: avatar > 5MB'"

# Block admin endpoints from non-FASO domains in Origin
SecRule REQUEST_URI "^/admin/" \
  "id:100030,phase:1,chain,pass,nolog"
  SecRule REQUEST_HEADERS:Origin "!@rx ^https?://(localhost|.*\.faso\.gov\.bf)" \
    "deny,status:403,log,msg:'FASO: admin from external origin'"

# Anomaly-score blocking action (phase 5 last)
SecRule TX:ANOMALY_SCORE "@ge %{tx.inbound_anomaly_score_threshold}" \
  "id:949110,phase:2,deny,status:403,log,msg:'FASO: inbound anomaly score exceeded'"
