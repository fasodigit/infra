# ARMAGEDDON Security Gateway Configuration
# FASO DIGITALISATION Project
# Pentagon Architecture: FORGE + SENTINEL + ARBITER + ORACLE + AEGIS + NEXUS + VEIL + WASM + AI

gateway:
  listeners:
    - name: https-inbound
      address: "0.0.0.0"
      port: 8443
      protocol: https
      tls:
        cert_path: /etc/armageddon/tls/tls.crt
        key_path: /etc/armageddon/tls/tls.key
        ca_path: null
        min_version: "1.3"
        alpn:
          - h2
          - http/1.1
    - name: grpc-inbound
      address: "0.0.0.0"
      port: 8444
      protocol: grpc
      tls:
        cert_path: /etc/armageddon/tls/tls.crt
        key_path: /etc/armageddon/tls/tls.key
        ca_path: null
        min_version: "1.3"
        alpn:
          - h2

  routes:
    - name: graphql
      match_rule:
        prefix: /api/graphql
        path: null
        regex: null
        headers: {}
        methods:
          - POST
      cluster: dgs-gateway
      timeout_ms: 30000
      retry_policy:
        num_retries: 2
        retry_on:
          - "5xx"
          - "reset"
        per_try_timeout_ms: 10000

    - name: connect-rpc
      match_rule:
        prefix: /api/connect/
        path: null
        regex: null
        headers: {}
        methods: []
      cluster: connect-backends
      timeout_ms: 15000
      retry_policy:
        num_retries: 1
        retry_on:
          - "5xx"
        per_try_timeout_ms: 5000

    - name: auth
      match_rule:
        prefix: /api/auth/
        path: null
        regex: null
        headers: {}
        methods: []
      cluster: auth-ms
      timeout_ms: 10000
      retry_policy: null

    - name: default
      match_rule:
        prefix: /
        path: null
        regex: null
        headers: {}
        methods: []
      cluster: default-backend
      timeout_ms: 30000
      retry_policy: null

  clusters:
    - name: dgs-gateway
      endpoints:
        - address: dgs-gateway
          port: 8080
          weight: 100
          healthy: true
      health_check:
        interval_ms: 5000
        timeout_ms: 2000
        unhealthy_threshold: 3
        healthy_threshold: 2
        protocol: Http
        path: /healthz
      circuit_breaker:
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
      outlier_detection:
        consecutive_5xx: 5
        interval_ms: 10000
        base_ejection_time_ms: 30000
        max_ejection_percent: 50

    - name: connect-backends
      endpoints:
        - address: connect-backend
          port: 8080
          weight: 100
          healthy: true
      health_check:
        interval_ms: 5000
        timeout_ms: 2000
        unhealthy_threshold: 3
        healthy_threshold: 2
        protocol: Grpc
        path: null
      circuit_breaker:
        max_connections: 512
        max_pending_requests: 512
        max_requests: 512
        max_retries: 2
      outlier_detection:
        consecutive_5xx: 5
        interval_ms: 10000
        base_ejection_time_ms: 30000
        max_ejection_percent: 50

    - name: auth-ms
      endpoints:
        - address: auth-ms
          port: 8080
          weight: 100
          healthy: true
      health_check:
        interval_ms: 5000
        timeout_ms: 2000
        unhealthy_threshold: 3
        healthy_threshold: 2
        protocol: Http
        path: /healthz
      circuit_breaker:
        max_connections: 256
        max_pending_requests: 256
        max_requests: 256
        max_retries: 2
      outlier_detection:
        consecutive_5xx: 3
        interval_ms: 10000
        base_ejection_time_ms: 30000
        max_ejection_percent: 30

    - name: default-backend
      endpoints:
        - address: default-backend
          port: 8080
          weight: 100
          healthy: true
      health_check:
        interval_ms: 10000
        timeout_ms: 3000
        unhealthy_threshold: 3
        healthy_threshold: 2
        protocol: Http
        path: /healthz
      circuit_breaker:
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
      outlier_detection:
        consecutive_5xx: 5
        interval_ms: 10000
        base_ejection_time_ms: 30000
        max_ejection_percent: 50

  jwt:
    jwks_uri: http://auth-ms:8080/.well-known/jwks.json
    issuer: auth-ms
    audiences:
      - faso-api
    algorithm: ES384
    cache_ttl_secs: 300
    require_claims:
      - sub
      - iat
      - exp

  cors:
    - platform: web-app
      config:
        allowed_origins:
          - https://app.faso.bf
          - https://staging.faso.bf
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowed_headers:
          - Authorization
          - Content-Type
          - X-Request-ID
        exposed_headers:
          - X-Request-ID
        max_age_secs: 3600
        allow_credentials: true

    - platform: admin-panel
      config:
        allowed_origins:
          - https://admin.faso.bf
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
        allowed_headers:
          - Authorization
          - Content-Type
        exposed_headers: []
        max_age_secs: 1800
        allow_credentials: true

  ext_authz:
    enabled: true
    grpc_address: "127.0.0.1:9191"
    timeout_ms: 500
    fail_closed: true

  xds:
    address: xds-controller
    port: 18000
    node_id: armageddon-0
    cluster_name: armageddon

security:
  sentinel:
    enabled: true
    signature_path: /etc/armageddon/signatures/
    geoip_db_path: /etc/armageddon/geoip/GeoLite2-City.mmdb
    blocked_countries: []
    ja3_blacklist_path: /etc/armageddon/ja3/blacklist.txt
    rate_limit:
      enabled: true
      window_secs: 60
      max_requests: 1000
      key_type: ip
    dlp:
      enabled: true
      patterns_path: /etc/armageddon/dlp/patterns.yaml
      scan_response: true

  arbiter:
    enabled: true
    paranoia_level: 2
    crs_path: /etc/armageddon/crs/
    custom_rules_path: /etc/armageddon/rules/custom/
    anomaly_threshold: 5
    learning_mode: false

  oracle:
    enabled: true
    model_path: /etc/armageddon/models/anomaly.onnx
    feature_count: 22
    anomaly_threshold: 0.85
    prompt_injection_threshold: 0.80

  aegis:
    enabled: true
    policy_dir: /etc/armageddon/policies/
    default_decision: deny

  nexus:
    block_threshold: 0.75
    challenge_threshold: 0.50
    correlation_window_ms: 5000

  veil:
    enabled: true
    remove_headers:
      - server
      - x-powered-by
      - x-aspnet-version
      - x-aspnetmvc-version
      - x-runtime
      - x-version
      - via
    inject_headers:
      - name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
      - name: X-Content-Type-Options
        value: nosniff
      - name: X-Frame-Options
        value: DENY
      - name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"

  wasm:
    enabled: false
    plugins_dir: /etc/armageddon/plugins/
    max_memory_bytes: 67108864
    max_execution_time_ms: 100

  ai:
    enabled: true
    threat_intel_feeds:
      - https://rules.emergingthreats.net/blockrules/compromised-ips.txt
    prompt_injection_model_path: null
    refresh_interval_secs: 3600

kaya:
  host: kaya
  port: 6379
  password: null
  db: 0
  pool_size: 16
  tls: false

observability:
  log_level: info
  log_format: json
  metrics_port: 9090
  traces_endpoint: null
