# =============================================================================
# ORY Kratos Configuration - FASO DIGITALISATION (DEV)
# =============================================================================
# Architecture: Angular -> BFF (Next.js) -> ARMAGEDDON:8080 -> Kratos -> Backend
# Cache: KAYA on port 6380
# Auth-MS: HTTP 8801 / gRPC 9801
# =============================================================================

version: v1.3.1

dsn: postgres://kratos:kratos@localhost:5433/kratos?sslmode=disable&max_conns=20&max_idle_conns=4

serve:
  public:
    base_url: http://localhost:4433/
    host: 0.0.0.0
    port: 4433
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:4200   # Angular frontend
        - http://localhost:4801   # Self-service UI
        - http://localhost:3000   # BFF (Next.js)
        - http://localhost:8080   # ARMAGEDDON gateway
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
        - X-CSRF-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
        - X-CSRF-Token
      allow_credentials: true

  admin:
    base_url: http://localhost:4434/
    host: 0.0.0.0
    port: 4434

# ---------------------------------------------------------------------------
# Session configuration
# ---------------------------------------------------------------------------
session:
  cookie:
    name: ory_kratos_session
    domain: localhost
    path: /
    same_site: Lax
    persistent: true
  lifespan: 8h
  whoami:
    required_aal: aal1

# ---------------------------------------------------------------------------
# Identity configuration
# ---------------------------------------------------------------------------
identity:
  default_schema_id: user_v1
  schemas:
    - id: user_v1
      url: file:///etc/config/kratos-schemas/identity.schema.json

# ---------------------------------------------------------------------------
# Self-service flows
# ---------------------------------------------------------------------------
selfservice:
  default_browser_return_url: http://localhost:4801/

  allowed_return_urls:
    - http://localhost:4200
    - http://localhost:4801
    - http://localhost:3000

  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false
        min_password_length: 8
        identifier_similarity_check_enabled: false
    totp:
      enabled: true
      config:
        issuer: FasoDigitalisation
    code:
      enabled: true
      config:
        # NOTE Phase 4.b admin-UI : Kratos `code` flow ne supporte pas
        # nativement un OTP 8 chiffres (longueur fixée à 6 dans le code
        # Go upstream). L'OTP admin 8-chiffres sera émis par auth-ms
        # (OtpService) en parallèle — voir admin-ui-deploy-runbook.md.
        lifespan: 15m
    link:
      enabled: true
      config:
        lifespan: 1h
    # ---- WebAuthn (admin MFA strong) -------------------------------------
    webauthn:
      enabled: true
      config:
        passwordless: false
        rp:
          id: faso.bf
          display_name: "FASO DIGITALISATION"
          origins:
            - http://localhost:4801
            - https://admin.faso.bf

  flows:
    login:
      ui_url: http://localhost:4801/auth/login
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: web_hook
              config:
                url: http://auth-ms:8801/internal/admin/login-event
                method: POST
                body: base64:
                response:
                  ignore: true
                  parse: false
                can_interrupt: false
                auth:
                  type: api_key
                  config:
                    name: Authorization
                    value: 'Bearer {{ env "KRATOS_INTERNAL_TOKEN" }}'
                    in: header

    registration:
      enabled: true
      ui_url: http://localhost:4801/auth/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui
            - hook: web_hook
              config:
                url: http://auth-ms:8801/internal/admin/registration-event
                method: POST
                body: base64://ZnVuY3Rpb24oY3R4KQp7CiAgaWRlbnRpdHlfaWQ6IGN0eC5pZGVudGl0eS5pZCwKICBlbWFpbDogY3R4LmlkZW50aXR5LnRyYWl0cy5lbWFpbCwKICByb2xlOiBjdHguaWRlbnRpdHkudHJhaXRzLnJvbGUsCiAgY3JlYXRlZF9hdDogY3R4LmlkZW50aXR5LmNyZWF0ZWRfYXQsCiAgZmxvd19pZDogY3R4LmZsb3cuaWQKfQ==
                response:
                  ignore: true
                  parse: false
                can_interrupt: false
                auth:
                  type: api_key
                  config:
                    name: Authorization
                    value: 'Bearer {{ env "KRATOS_INTERNAL_TOKEN" }}'
                    in: header

    recovery:
      enabled: true
      ui_url: http://localhost:4801/auth/recovery
      use: code
      lifespan: 1h
      notify_unknown_recipients: false

    verification:
      enabled: true
      ui_url: http://localhost:4801/auth/verification
      use: code
      lifespan: 24h
      after:
        default_browser_return_url: http://localhost:4801/auth/login

    settings:
      ui_url: http://localhost:4801/auth/settings
      privileged_session_max_age: 15m
      required_aal: aal1

    error:
      ui_url: http://localhost:4801/auth/error

    logout:
      after:
        default_browser_return_url: http://localhost:4801/auth/login

# ---------------------------------------------------------------------------
# Courier (email delivery)
# ---------------------------------------------------------------------------
courier:
  smtp:
    connection_uri: smtps://test:test@localhost:1025/?skip_ssl_verify=true&legacy_ssl=true
    from_address: noreply@faso-digitalisation.dev
    from_name: Faso Digitalisation (DEV)
  # template_override_path: /etc/config/kratos/templates  # Disabled: no custom templates yet

# ---------------------------------------------------------------------------
# Hashing (Argon2id — Phase 4.b.3 alignment, OWASP 2024 baseline)
# Mirrors auth-ms admin.crypto.argon2.password profile so a credential
# minted by Kratos verifies in auth-ms (and vice versa) without a re-hash.
# ---------------------------------------------------------------------------
hashers:
  algorithm: argon2
  argon2:
    parallelism: 4
    memory: 64MB          # 65 536 KiB
    iterations: 3
    salt_length: 16
    key_length: 32

# ---------------------------------------------------------------------------
# Secrets - loaded from env vars set by Docker secrets _FILE convention
# Run scripts/init-secrets.sh and ensure SECRETS_COOKIE / SECRETS_CIPHER
# are populated (Compose passes SECRETS_COOKIE_FILE / SECRETS_CIPHER_FILE).
# For local dev without Compose: export SECRETS_COOKIE=$(cat secrets/kratos_cookie_secret.txt)
# ---------------------------------------------------------------------------
secrets:
  cookie:
    - '{{ env "SECRETS_COOKIE" }}'
  cipher:
    - '{{ env "SECRETS_CIPHER" }}'

# ---------------------------------------------------------------------------
# Ciphers
# ---------------------------------------------------------------------------
ciphers:
  algorithm: xchacha20-poly1305

# ---------------------------------------------------------------------------
# Logging (DEV)
# ---------------------------------------------------------------------------
log:
  level: debug
  format: json
  leak_sensitive_values: false
