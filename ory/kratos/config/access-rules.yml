# ---------------------------------------------------------------------------
# KETO RELATION CHECK (internal / admin only)
# ---------------------------------------------------------------------------
- id: keto-check
  version: v0.40.8
  match:
    url: "<http|https>://<[a-zA-Z0-9-.:]+>/relation-tuples/check<**>"
    methods:
      - GET
      - POST
  authenticators:
    - handler: cookie_session
    - handler: bearer_token
  authorizer:
    handler: remote_json
  mutators:
    - handler: header
  upstream:
    url: http://keto:4466

# ---------------------------------------------------------------------------
# CATCH-ALL: DENY UNMATCHED ROUTES
# ---------------------------------------------------------------------------
- id: catch-all-deny
  version: v0.40.8
  match:
    url: "<http|https>://<[a-zA-Z0-9-.:]+>/<**>"
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
  authenticators:
    - handler: anonymous
  authorizer:
    handler: deny
  mutators:
    - handler: noop
