  mutators:
    - handler: header
  upstream:
    url: http://kratos:4433

# ---------------------------------------------------------------------------
# AUTH-MS PROTECTED API ENDPOINTS
# ---------------------------------------------------------------------------
- id: auth-ms-api
  version: v0.40.8
  match:
    url: "<http|https>://<[a-zA-Z0-9-.:]+>/api/v1/<{users,roles,permissions,platforms}><**>"
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
  authenticators:
    - handler: cookie_session
    - handler: bearer_token
  authorizer:
    handler: remote_json
  mutators:
    - handler: id_token
    - handler: header
  upstream:
    url: http://auth-ms:8801
    strip_path: ""

