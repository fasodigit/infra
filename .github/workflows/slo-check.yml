#
# slo-check.yml — Validation Sloth + régénération des Prometheus rules.
#
# Trigger : pull_request sur INFRA/observability/slo/**
# Valide la syntaxe Sloth, rejoue la génération, auto-commit les rules
# Prometheus régénérées via stefanzweifel/git-auto-commit-action.
---
name: SLO Check (Sloth)

on:
  pull_request:
    paths:
      - 'INFRA/observability/slo/**'
      - '.github/workflows/slo-check.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  slo-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install sloth
        run: |
          set -euo pipefail
          SLOTH_VERSION="v0.12.0"
          curl -sLo sloth.tar.gz \
            "https://github.com/slok/sloth/releases/download/${SLOTH_VERSION}/sloth-linux-amd64.tar.gz"
          tar -xzf sloth.tar.gz
          sudo mv sloth /usr/local/bin/sloth
          sloth version

      - name: Validate SLO definitions (sloth validate)
        run: sloth validate -i INFRA/observability/slo/

      - name: Regenerate Prometheus rules
        run: bash INFRA/observability/slo/generate-rules.sh

      - name: Show diff (Prometheus rules)
        run: |
          git diff --stat INFRA/observability/prometheus/rules/slo/ || true
          git diff INFRA/observability/prometheus/rules/slo/ || true

      - name: Auto-commit regenerated SLO rules
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(slo): regenerate Prometheus rules from Sloth definitions

            Auto-generated by .github/workflows/slo-check.yml.
          file_pattern: 'INFRA/observability/prometheus/rules/slo/*.rules.yml'
          commit_user_name: faso-ci-bot
          commit_user_email: fasodigitalisation@gmail.com
          commit_author: 'faso-ci-bot <fasodigitalisation@gmail.com>'
