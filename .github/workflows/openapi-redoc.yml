name: openapi-redoc

on:
  push:
    branches: [main]
    paths:
      - "INFRA/auth-ms/**"
      - "INFRA/poulets-platform/**"

permissions:
  contents: write

jobs:
  build-redoc:
    name: Build Redoc for Java microservices
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: auth-ms
            path: INFRA/auth-ms
            port: 8081
          - service: poulets-api
            path: INFRA/poulets-platform/backend
            port: 8082

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start ${{ matrix.service }} and extract OpenAPI spec
        working-directory: ${{ matrix.path }}
        run: |
          mvn -q spring-boot:run \
            -Dspring-boot.run.arguments="--server.port=${{ matrix.port }} --spring.profiles.active=ci" \
            -Dspring-boot.run.jvmArguments="-Dmanagement.endpoints.web.exposure.include=*" &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV

          # Wait for the app to be ready (max 90 s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ matrix.port }}/actuator/health > /dev/null 2>&1; then
              echo "Service ${{ matrix.service }} is up."
              break
            fi
            echo "Waiting… ($i/30)"
            sleep 3
          done

          mkdir -p openapi/${{ matrix.service }}
          curl -sf http://localhost:${{ matrix.port }}/v3/api-docs \
            -o openapi/${{ matrix.service }}/openapi.json

          kill $APP_PID || true

      - name: Build Redoc static HTML — ${{ matrix.service }}
        run: |
          npx --yes @redocly/cli build-docs \
            openapi/${{ matrix.service }}/openapi.json \
            --output openapi/${{ matrix.service }}/index.html \
            --title "${{ matrix.service }} API"

      - name: Upload Redoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: redoc-${{ matrix.service }}
          path: openapi/${{ matrix.service }}/

  deploy-redoc:
    name: Deploy Redoc to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-redoc

    steps:
      - name: Download all Redoc artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: redoc-*
          path: gh-pages/openapi
          merge-multiple: false

      - name: Rename artifact dirs to service names
        run: |
          cd gh-pages/openapi
          for d in redoc-*; do
            svc="${d#redoc-}"
            mv "$d" "$svc"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          destination_dir: .
          keep_files: true
