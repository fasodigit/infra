#
# Build + publish ghcr.io/faso-digitalisation/synthetic-monitoring:latest
# and validate Playwright specs in CI (dry-run on staging).

name: synthetic-monitoring-build

on:
  push:
    branches: [main]
    paths:
      - 'synthetic-monitoring/**'
      - '.github/workflows/synthetic-build.yml'
  pull_request:
    paths:
      - 'synthetic-monitoring/**'
      - '.github/workflows/synthetic-build.yml'
  schedule:
    # Weekly rebuild so base image gets patched.
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/faso-digitalisation/synthetic-monitoring

jobs:
  validate-specs:
    name: Validate specs (dry-run on staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
    defaults:
      run:
        working-directory: synthetic-monitoring
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: npm ci || npm install

      - name: List tests (syntax + discovery)
        run: npx playwright test --list

      - name: Dry-run on staging
        env:
          FASO_PROD_URL: ${{ vars.FASO_STAGING_URL || 'https://staging.faso.gov.bf' }}
          FASO_ENV: staging
          FASO_REGION: ouagadougou-1
          PROM_PUSHGATEWAY_URL: ${{ vars.STAGING_PUSHGATEWAY_URL }}
          SYNTHETIC_USER_EMAIL: ${{ secrets.STAGING_SYNTHETIC_USER_EMAIL }}
          SYNTHETIC_USER_PASSWORD: ${{ secrets.STAGING_SYNTHETIC_USER_PASSWORD }}
          ETAT_CIVIL_READY: 'false'
        # Only the auth flow is run in CI dry-run to keep it fast and avoid
        # producing orders / etat-civil demands on staging.
        run: npx playwright test playwright/flows/auth.spec.ts --reporter=list

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-dryrun-traces-${{ github.run_id }}
          path: synthetic-monitoring/test-results
          retention-days: 7

  build-image:
    name: Build + push runner image
    runs-on: ubuntu-latest
    needs: validate-specs
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: synthetic-monitoring
          file: synthetic-monitoring/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
