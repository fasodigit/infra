# SPDX-License-Identifier: AGPL-3.0-or-later
# Nightly WAL + snapshot replay test. Creates a P1 GitHub issue on divergence.
name: WAL Replay Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        fsync_policy: [always, everysec]
    defaults:
      run:
        working-directory: INFRA/kaya
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: INFRA/kaya }

      - name: Run WAL replay test (fsync=${{ matrix.fsync_policy }})
        env:
          KAYA_FSYNC_POLICY: ${{ matrix.fsync_policy }}
        run: |
          cargo test --release --test wal_replay_nightly -- --nocapture | tee replay.log
          grep -q '^PASS' replay.log

      - name: Push metrics to Pushgateway
        if: always()
        env:
          PROM_PUSHGATEWAY_URL: ${{ secrets.PROM_PUSHGATEWAY_URL }}
        run: |
          [ -z "$PROM_PUSHGATEWAY_URL" ] && exit 0
          status=$([ "${{ job.status }}" = "success" ] && echo 1 || echo 0)
          printf 'kaya_wal_replay_success{fsync="%s"} %s\n' "${{ matrix.fsync_policy }}" "$status" | \
            curl --data-binary @- "$PROM_PUSHGATEWAY_URL/metrics/job/kaya-wal-replay"

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `WAL Replay Divergence (fsync=${{ matrix.fsync_policy }}) ${new Date().toISOString().slice(0,10)}`,
              labels: ['incident', 'P1', 'kaya-persistence'],
              body: `Nightly WAL replay test FAILED.\nFsync policy: ${{ matrix.fsync_policy }}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nRunbook: INFRA/scripts/WAL-REPLAY-README.md`,
            });
