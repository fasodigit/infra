# SPDX-License-Identifier: AGPL-3.0-or-later
# SPIRE SVID expiry monitoring : every 4h, alert if any SVID < 72h.
name: SPIRE SVID Monitoring

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-svid-expiry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_FASO }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run check-svid-expiry
        env:
          PROM_PUSHGATEWAY_URL: ${{ secrets.PROM_PUSHGATEWAY_URL }}
        run: bash INFRA/spire/scripts/check-svid-expiry.sh

      - name: Create incident on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `SPIRE SVID expiring (< 72h) — ${new Date().toISOString().slice(0,10)}`,
              labels: ['incident', 'P1', 'spire', 'mTLS'],
              body: `At least one workload SVID expires within 72h.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nRunbook: INFRA/spire/SPIRE-README.md`,
            });
