---
# FASO DIGITALISATION — Server-side pre-commit enforcement
# Runs on every PR to guarantee hooks pass even when devs skip local install.
# Docs: https://pre-commit.com/

name: pre-commit CI

on:
  pull_request:
    branches:
      - main
      - master
      - "release/**"
      - "hotfix/**"
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks (all files)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed by gitleaks commit scan

      - name: Set up Python (for pre-commit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            INFRA/kaya/target
          key: cargo-${{ runner.os }}-${{ hashFiles('INFRA/kaya/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install hadolint
        run: |
          curl -sSfL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: "" # do not skip any hooks in CI
