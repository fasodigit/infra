# Synthetic monitoring: Playwright scenarios every 5 min, push metrics to Prometheus.

name: Synthetic Prod

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
    defaults:
      run:
        working-directory: INFRA/synthetic-monitoring/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm ci || npm install

      - name: Run synthetic tests
        env:
          FASO_PROD_URL: ${{ vars.FASO_PROD_URL }}
          FASO_ENV: prod
          FASO_REGION: bf-ouaga
          PROM_PUSHGATEWAY_URL: ${{ secrets.PROM_PUSHGATEWAY_URL }}
          SYNTHETIC_USER_EMAIL: ${{ secrets.SYNTHETIC_USER_EMAIL }}
          SYNTHETIC_USER_PASSWORD: ${{ secrets.SYNTHETIC_USER_PASSWORD }}
        run: npx playwright test

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-traces-${{ github.run_id }}
          path: |
            INFRA/synthetic-monitoring/playwright/test-results/
            INFRA/synthetic-monitoring/playwright/results.json
          retention-days: 7

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Synthetic alert: failure at ${new Date().toISOString()}`,
              labels: ['incident', 'synthetic-monitoring', 'P2'],
              body: `Synthetic monitoring detected a failure.\n\nRun: ${runUrl}\n\nPlease investigate via traces/videos attached.`,
            });
