name: markdown-lint

on:
  push:
    branches: ["**"]
    paths:
      - "**/*.md"
  pull_request:
    branches: ["**"]
    paths:
      - "**/*.md"

permissions:
  contents: read

jobs:
  lint:
    name: Markdownlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !node_modules/**/*.md
            !**/target/**/*.md
