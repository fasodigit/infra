// Listener Discovery Service (LDS).
// ARMAGEDDON subscribes to receive listener configurations and filter chains.
syntax = "proto3";

package envoy.service.listener.v3;

import "envoy/service/discovery/v3/discovery.proto";

service ListenerDiscoveryService {
  rpc StreamListeners(stream envoy.service.discovery.v3.DiscoveryRequest)
      returns (stream envoy.service.discovery.v3.DiscoveryResponse) {}

  rpc DeltaListeners(stream envoy.service.discovery.v3.DeltaDiscoveryRequest)
      returns (stream envoy.service.discovery.v3.DeltaDiscoveryResponse) {}

  rpc FetchListeners(envoy.service.discovery.v3.DiscoveryRequest)
      returns (envoy.service.discovery.v3.DiscoveryResponse) {}
}
