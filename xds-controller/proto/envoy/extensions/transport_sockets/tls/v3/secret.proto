// Secret configuration for xDS SDS.
// Distributes TLS certificates from SPIRE to ARMAGEDDON.
syntax = "proto3";

package envoy.extensions.transport_sockets.tls.v3;

// Secret: top-level SDS resource for TLS material.
message Secret {
  // Secret name (typically the SPIFFE ID).
  string name = 1;

  oneof type {
    TlsCertificate tls_certificate = 2;
    CertificateValidationContext validation_context = 3;
  }
}

// TLS certificate and private key.
message TlsCertificate {
  // PEM-encoded certificate chain.
  DataSource certificate_chain = 1;

  // PEM-encoded private key.
  DataSource private_key = 2;

  // OCSP staple.
  DataSource ocsp_staple = 4;
}

// Certificate validation (trusted CAs).
message CertificateValidationContext {
  // Trusted CA certificates.
  DataSource trusted_ca = 1;

  // SPIFFE IDs to accept.
  repeated string match_subject_alt_names = 9;

  // CRL.
  DataSource crl = 7;
}

// Data source for certificate material.
message DataSource {
  oneof specifier {
    string filename = 1;
    bytes inline_bytes = 2;
    string inline_string = 3;
  }
}
