# ============================================================
# notifier-ms — FASO DIGITALISATION Notification Microservice
# ============================================================

server:
  port: 8803
  shutdown: graceful

spring:
  application:
    name: notifier-ms

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Database ────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notifier}
    username: ${POSTGRES_USER:notifier}
    password: ${POSTGRES_PASSWORD:notifier}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ── Redpanda (Kafka-compatible protocol) ────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:${KAFKA_BROKERS:redpanda:9092}}
    consumer:
      group-id: notifier-ms
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      enable-auto-commit: false
      max-poll-records: 10
      properties:
        isolation.level: read_committed
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
      retries: 3
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3
      auto-startup: ${FASO_KAFKA_ENABLED:false}

  # ── KAYA (sovereign in-memory store, Redis-protocol) ────────
  data:
    redis:
      url: ${KAYA_URL:redis://kaya:6380}
      connect-timeout: 5000
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ── Mail (Mailpit dev) ───────────────────────────────────────
  mail:
    host: ${SMTP_HOST:mailpit}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # ── Thread pool for async mail dispatch ─────────────────────
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 500
      thread-name-prefix: notifier-async-

# ── Actuator ────────────────────────────────────────────────────
# NOTE: actuator exposed on the main server port (8803) so that
# /actuator/health is reachable at http://localhost:8803/actuator/health
# without needing a separate management port.
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: notifier-ms
      environment: ${FASO_ENV:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# ── Resilience4j ────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      mail-dispatch:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.mail.MailException
          - java.io.IOException
        ignore-exceptions:
          - bf.gov.faso.notifier.service.TemplateNotFoundException

# ── Notifier configuration ──────────────────────────────────────
notifier:
  topics:
    github-events: ${GITHUB_EVENTS_TOPIC:github.events.v1}
    dlq: ${GITHUB_EVENTS_DLQ_TOPIC:github.events.v1.dlq}
  dedupe:
    ttl-seconds: 604800   # 7 days
    key-prefix: "delivery:"
  mail:
    from: ${MAIL_FROM:noreply@faso.gov.bf}
    from-name: ${MAIL_FROM_NAME:FASO DIGITALISATION}
  context-rules:
    file: ${CONTEXT_RULES_FILE:classpath:context-rules.json}

# ── Auth-ms JWKS endpoint for token validation ──────────────────
spring.security.oauth2.resourceserver:
  jwt:
    jwk-set-uri: ${AUTH_MS_JWKS_URI:http://auth-ms:8801/.well-known/jwks.json}

# ── gRPC (future) ───────────────────────────────────────────────
grpc:
  server:
    port: 9803
    enabled: false

---
# ── Dev profile — host-local bootstrap ─────────────────────────
# Active by default (SPRING_PROFILES_ACTIVE=dev). Points at
# host-exposed services (localhost Postgres, KAYA, Mailpit) and
# keeps the Kafka listener stopped so there's no broker-spam when
# Redpanda isn't running.
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/notifier
    username: notifier
    password: notifier

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    listener:
      auto-startup: false

  data:
    redis:
      url: redis://127.0.0.1:6380

  mail:
    host: localhost
    port: 1025

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_MS_JWKS_URI:http://localhost:8801/.well-known/jwks.json}

---
# ── Production profile (Mailersend) ─────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  mail:
    host: smtp.mailersend.net
    port: 587
    username: ${MAILERSEND_SMTP_USER}
    password: ${MAILERSEND_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
