syntax = "proto3";

package bf.gov.actes;

option java_multiple_files = true;
option java_package = "bf.gov.actes.grpc.audit";
option java_outer_classname = "AuditProto";

import "google/protobuf/timestamp.proto";
import "bf/gov/actes/common.proto";

// =============================================================================
// Audit Service - For system audits via Redpanda/Kafka
// =============================================================================

service AuditService {
    // Record single audit event
    rpc RecordAuditEvent(AuditEvent) returns (AuditResponse);

    // Record batch of audit events (streaming)
    rpc RecordAuditBatch(stream AuditEvent) returns (BatchAuditResponse);

    // Query audit trail for a document
    rpc GetAuditTrail(AuditTrailRequest) returns (stream AuditEvent);

    // Verify audit chain integrity (blockchain-style)
    rpc VerifyAuditChain(VerifyChainRequest) returns (VerifyChainResponse);

    // Export audit data for RGPD compliance
    rpc ExportAuditData(ExportRequest) returns (stream ExportChunk);
}

// =============================================================================
// Audit Event Types
// =============================================================================

enum AuditEventType {
    AUDIT_EVENT_TYPE_UNSPECIFIED = 0;

    // Document lifecycle
    DOCUMENT_CREATED = 1;
    DOCUMENT_UPDATED = 2;
    DOCUMENT_SUBMITTED = 3;
    DOCUMENT_LOCKED = 4;
    DOCUMENT_UNLOCKED = 5;
    DOCUMENT_TREATED = 6;
    DOCUMENT_VALIDATED = 7;
    DOCUMENT_REJECTED = 8;
    DOCUMENT_PRINTED = 9;
    DOCUMENT_DELIVERED = 10;
    DOCUMENT_ARCHIVED = 11;

    // File operations
    FILE_UPLOADED = 20;
    FILE_DOWNLOADED = 21;
    FILE_DELETED = 22;
    FILE_SCANNED = 23;

    // Security events
    USER_LOGIN = 30;
    USER_LOGOUT = 31;
    USER_LOGIN_FAILED = 32;
    PERMISSION_DENIED = 33;
    SUSPICIOUS_ACTIVITY = 34;

    // System events
    SYSTEM_ERROR = 40;
    SYSTEM_WARNING = 41;
    SERVICE_STARTED = 42;
    SERVICE_STOPPED = 43;
    CONFIG_CHANGED = 44;

    // Notification events
    NOTIFICATION_SENT = 50;
    NOTIFICATION_FAILED = 51;
    EMAIL_SENT = 52;
    SMS_SENT = 53;
    OTP_GENERATED = 54;
    OTP_VERIFIED = 55;
    OTP_EXPIRED = 56;
}

enum AuditSeverity {
    AUDIT_SEVERITY_UNSPECIFIED = 0;
    INFO = 1;
    WARNING = 2;
    ERROR = 3;
    CRITICAL = 4;
}

// =============================================================================
// Audit Event Message
// =============================================================================

message AuditEvent {
    // Identifiers
    string event_id = 1;
    string correlation_id = 2;  // Distributed tracing ID
    string tenant_id = 3;

    // Event metadata
    AuditEventType event_type = 4;
    AuditSeverity severity = 5;
    google.protobuf.Timestamp timestamp = 6;
    string source_service = 7;  // Service that generated the event

    // Actor information
    string user_id = 8;
    string username = 9;
    string user_role = 10;
    string ip_address = 11;
    string user_agent = 12;

    // Target resource
    string resource_type = 13;  // demande, document, file, user
    string resource_id = 14;
    string resource_name = 15;

    // Event details
    string action = 16;  // Human-readable action description
    string description = 17;
    map<string, string> metadata = 18;  // Additional context

    // State changes
    string previous_state = 19;
    string new_state = 20;

    // Blockchain-style integrity
    string previous_hash = 21;
    string event_hash = 22;  // SHA-256(event_id + previous_hash + data)
}

// =============================================================================
// Responses
// =============================================================================

message AuditResponse {
    ResponseStatus status = 1;
    string event_id = 2;
    string event_hash = 3;
}

message BatchAuditResponse {
    ResponseStatus status = 1;
    int32 total_received = 2;
    int32 total_processed = 3;
    int32 total_failed = 4;
    repeated string failed_event_ids = 5;
}

// =============================================================================
// Query Messages
// =============================================================================

message AuditTrailRequest {
    RequestMetadata request_metadata = 1;

    // Filters
    string resource_type = 2;
    string resource_id = 3;
    string user_id = 4;
    repeated AuditEventType event_types = 5;
    google.protobuf.Timestamp start_time = 6;
    google.protobuf.Timestamp end_time = 7;
    AuditSeverity min_severity = 8;

    PaginationRequest pagination = 9;
}

// =============================================================================
// Integrity Verification
// =============================================================================

message VerifyChainRequest {
    RequestMetadata request_metadata = 1;
    string tenant_id = 2;
    google.protobuf.Timestamp start_time = 3;
    google.protobuf.Timestamp end_time = 4;
    string start_event_id = 5;  // Optional: verify from specific event
}

message VerifyChainResponse {
    ResponseStatus status = 1;
    bool chain_valid = 2;
    int64 events_verified = 3;
    int64 events_invalid = 4;
    repeated InvalidEvent invalid_events = 5;
    google.protobuf.Timestamp verified_at = 6;
}

message InvalidEvent {
    string event_id = 1;
    string expected_hash = 2;
    string actual_hash = 3;
    string reason = 4;
}

// =============================================================================
// RGPD Export
// =============================================================================

message ExportRequest {
    RequestMetadata request_metadata = 1;
    string tenant_id = 2;
    string user_id = 3;  // Export data for specific user (RGPD)
    google.protobuf.Timestamp start_time = 4;
    google.protobuf.Timestamp end_time = 5;
    ExportFormat format = 6;
}

enum ExportFormat {
    EXPORT_FORMAT_UNSPECIFIED = 0;
    EXPORT_JSON = 1;
    EXPORT_CSV = 2;
    EXPORT_PDF = 3;
}

message ExportChunk {
    bytes data = 1;
    int32 chunk_number = 2;
    int32 total_chunks = 3;
    bool is_final = 4;
}

// =============================================================================
// Kafka/Redpanda Topic Configuration
// =============================================================================
// Topics:
//   - etat-civil.audit.events (main audit events)
//   - etat-civil.audit.security (security-specific events)
//   - etat-civil.audit.system (system events)
//   - etat-civil.notifications.email (email notifications)
//   - etat-civil.notifications.sms (SMS notifications)
//   - etat-civil.files.events (file upload/download events)
//
// Retention:
//   - audit.events: 365 days (compliance)
//   - audit.security: 730 days (2 years for security)
//   - notifications.*: 30 days
//   - files.events: 90 days
