# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
# ignore = ["RUSTSEC-XXXX-XXXX"]  # add exceptions here after review

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []

[licenses]
# Licenses explicitly allowed
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "AGPL-3.0",
  "AGPL-3.0-only",
  "AGPL-3.0-or-later",
]
# Licenses explicitly denied
deny = [
  "GPL-2.0",
  "GPL-2.0-only",
  "GPL-2.0-or-later",
]
# Confidence threshold for license text matching (0.0 - 1.0)
confidence-threshold = 0.8
copyleft = "warn"
unlicensed = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Add trusted private registries below if needed:
# allow-org = { github = ["your-org"] }
