# FASO DIGITALISATION — SPIRE Agent configuration
# Trust domain         : faso.gov.bf
# Workload API socket  : /run/spire/sockets/agent.sock
# WorkloadAttestors    : unix (dev) + k8s (prod) + docker
# Trust bundle refresh : 1 h
# Prometheus           : :9989/metrics

agent {
  data_dir          = "/opt/spire/data/agent"
  log_level         = "INFO"
  log_format        = "JSON"

  server_address    = "faso-spire-server"
  server_port       = "8081"

  # Workload API socket consumed by ARMAGEDDON, KAYA, Java microservices.
  # ARMAGEDDON and KAYA use armageddon-mesh crate:
  #   WorkloadApiClient::new_from_path("/run/spire/sockets/agent.sock")
  socket_path       = "/run/spire/sockets/agent.sock"

  trust_bundle_path = "/opt/spire/conf/agent/bootstrap.crt"
  trust_domain      = "faso.gov.bf"

  # Refresh trust bundle from server every hour to pick up CA rotations.
  trust_bundle_refresh_hint = "1h"
}

plugins {
  # ── NodeAttestor : join_token (dev / bootstrap.sh) ───────────────────────
  NodeAttestor "join_token" {
    plugin_data {}
  }

  # ── NodeAttestor : k8s_psat (prod) ───────────────────────────────────────
  NodeAttestor "k8s_psat" {
    plugin_data {
      cluster = "faso-prod"
    }
  }

  # ── KeyManager ───────────────────────────────────────────────────────────
  # memory: acceptable for agent (SVIDs are rotated; nothing persistent needed)
  KeyManager "memory" {
    plugin_data {}
  }

  # ── WorkloadAttestor : unix (dev) ────────────────────────────────────────
  # Identifies workloads by UID/GID/PID on the local host.
  # Selectors: unix:uid:<uid>, unix:gid:<gid>, unix:path:<path>
  WorkloadAttestor "unix" {
    plugin_data {}
  }

  # ── WorkloadAttestor : k8s (prod) ────────────────────────────────────────
  # Reads pod metadata from kubelet to attach k8s selectors.
  WorkloadAttestor "k8s" {
    plugin_data {
      skip_kubelet_verification = false
      node_name_env             = "MY_NODE_NAME"
    }
  }

  # ── WorkloadAttestor : docker ─────────────────────────────────────────────
  # Identifies podman/docker workloads by container labels.
  WorkloadAttestor "docker" {
    plugin_data {
      docker_socket_path = "/run/podman/podman.sock"
    }
  }
}

# ── Health checks ─────────────────────────────────────────────────────────
health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8083"
  live_path        = "/live"
  ready_path       = "/ready"
}

# ── Telemetry ─────────────────────────────────────────────────────────────
telemetry {
  Prometheus {
    port = 9989
  }
}
