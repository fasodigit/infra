# FASO DIGITALISATION — SPIRE stack (podman-compose)
# Services   : faso-spire-server, faso-spire-agent
# Network    : faso-net (external — created by main podman-compose.yml)
# Volumes    : spire-server-data, spire-agent-data (persistent across restarts)
#
# Usage (dev):
#   cd INFRA/spire
#   bash scripts/bootstrap.sh        # first time: starts stack + registers workloads
#   podman-compose -f podman-compose.spire.yml up -d    # subsequent starts
#
# Healthchecks use the SPIRE built-in health endpoint (HTTP 200 on /live).

version: "3.9"

networks:
  faso-network:
    external: true

volumes:
  spire-server-data:
    driver: local
  spire-agent-data:
    driver: local
  spire-sockets:
    driver: local

services:
  # ── SPIRE Server ────────────────────────────────────────────────────────
  faso-spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    container_name: faso-spire-server
    restart: unless-stopped
    hostname: faso-spire-server
    command:
      - "-config"
      - "/opt/spire/conf/server/server.conf"
      - "-expandEnv"
    environment:
      # Injected by Vault Agent or podman secret at runtime.
      SPIRE_POSTGRES_URL: "${SPIRE_POSTGRES_URL:-postgresql://spire:spire_dev@faso-postgres:5432/spire_server?sslmode=disable}"
    volumes:
      - /home/lyna/Documents/DEVELOPMENT-CLAUDE/INFRA/spire/server/server.conf:/opt/spire/conf/server/server.conf:ro
      - /home/lyna/Documents/DEVELOPMENT-CLAUDE/INFRA/spire/certs/ca.crt:/opt/spire/conf/server/ca.crt:ro
      - /home/lyna/Documents/DEVELOPMENT-CLAUDE/INFRA/spire/certs/ca.key:/opt/spire/conf/server/ca.key:ro
      - spire-server-data:/opt/spire/data/server
    ports:
      # 8081 registration API — bind to loopback only in prod
      - "127.0.0.1:8081:8081"
      # 9988 Prometheus metrics
      - "127.0.0.1:9988:9988"
    expose:
      - "8081"
      - "8082"   # federation (future)
    networks:
      - faso-network
    healthcheck:
      test:
        - "CMD"
        - "/opt/spire/bin/spire-server"
        - "healthcheck"
        - "-socketPath"
        - "/tmp/spire-server/private/api.sock"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      org.opencontainers.image.description: "FASO SPIRE server — trust domain faso.gov.bf"
      faso.service: "spire-server"

  # ── SPIRE Agent ─────────────────────────────────────────────────────────
  faso-spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.9.6
    container_name: faso-spire-agent
    restart: unless-stopped
    hostname: faso-spire-agent
    command:
      - "-config"
      - "/opt/spire/conf/agent/agent.conf"
      - "-expandEnv"
      - "-joinToken"
      - "${SPIRE_JOIN_TOKEN}"
    depends_on:
      faso-spire-server:
        condition: service_healthy
    environment:
      # Join token written by bootstrap.sh into this env var.
      SPIRE_JOIN_TOKEN: "${SPIRE_JOIN_TOKEN:-}"
    volumes:
      - /home/lyna/Documents/DEVELOPMENT-CLAUDE/INFRA/spire/agent/agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - /home/lyna/Documents/DEVELOPMENT-CLAUDE/INFRA/spire/certs/ca.crt:/opt/spire/conf/agent/bootstrap.crt:ro
      - spire-agent-data:/opt/spire/data/agent
      # Shared socket — bind-mounted to host path so host-runtime workloads
      # (Java services in dev) and containerised workloads both see the same
      # /run/spire/sockets/agent.sock. Host path is created at compose-up
      # time; ensure the SPIRE_HOST_SOCKET_DIR env points at a writable
      # directory (defaults to ./spire/sockets relative to compose file).
      - ${SPIRE_HOST_SOCKET_DIR:-./sockets}:/run/spire/sockets
      # Podman socket for docker workload attestor (compat: docker.sock when on docker host)
      - /var/run/docker.sock:/run/podman/podman.sock:ro
    ports:
      # 9989 Prometheus metrics
      - "127.0.0.1:9989:9989"
    networks:
      - faso-network
    healthcheck:
      test:
        - "CMD"
        - "/opt/spire/bin/spire-agent"
        - "healthcheck"
        - "-socketPath"
        - "/run/spire/sockets/agent.sock"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      org.opencontainers.image.description: "FASO SPIRE agent — trust domain faso.gov.bf"
      faso.service: "spire-agent"
