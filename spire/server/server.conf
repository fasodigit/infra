# SPIRE server config — trust domain faso.gov.bf, 24h SVID rotation.
server {
  bind_address         = "0.0.0.0"
  bind_port            = "8081"
  trust_domain         = "faso.gov.bf"
  data_dir             = "/opt/spire/data/server"
  log_level            = "INFO"
  log_format           = "JSON"
  default_x509_svid_ttl = "24h"   # rotation 12h before expiry
  ca_ttl                = "2160h" # 90 days
  ca_subject = {
    country      = ["BF"]
    organization = ["FASO DIGITALISATION"]
    common_name  = "FASO CA"
  }
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type = "postgres"
      connection_string = "${SPIRE_POSTGRES_URL}"  # e.g. postgresql://spire:...@postgres:5432/spire
    }
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }

  NodeAttestor "k8s_psat" {
    plugin_data {
      clusters = {
        "faso-prod" = {
          service_account_allow_list = ["spire:spire-agent"]
        }
      }
    }
  }

  UpstreamAuthority "disk" {
    plugin_data {
      cert_file_path = "/opt/spire/conf/server/ca.crt"
      key_file_path  = "/opt/spire/conf/server/ca.key"
    }
  }

  Notifier "k8sbundle" {
    plugin_data {
      namespace = "spire"
      config_map = "trust-bundle"
    }
  }
}

health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8082"
}

telemetry {
  Prometheus {
    port = 9988
  }
}
