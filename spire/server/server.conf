# FASO DIGITALISATION — SPIRE Server configuration
# Trust domain  : faso.gov.bf
# SVID TTL      : 86400s (24h) workloads, 3600s (1h) nodes
# DataStore     : Postgres schema spire_server (faso-postgres)
# KeyManager    : disk (dev) — swap to vault_transit plugin for prod
# NodeAttestor  : join_token (dev)  +  k8s_psat (prod)
# Ports         : 8081 registration API (loopback), 8082 health/federation
# Prometheus    : :9988/metrics

server {
  bind_address    = "0.0.0.0"
  bind_port       = "8081"
  trust_domain    = "faso.gov.bf"
  data_dir        = "/opt/spire/data/server"
  log_level       = "INFO"
  log_format      = "JSON"

  # Workload SVID TTL : 24 h — rotation initiated 12 h before expiry
  default_x509_svid_ttl = "86400s"

  # Node SVID (agent) TTL : 1 h
  default_jwt_svid_ttl  = "3600s"

  # Intermediate CA : 90 days
  ca_ttl = "2160h"

  ca_subject = {
    country      = ["BF"]
    organization = ["FASO DIGITALISATION"]
    common_name  = "FASO SPIFFE CA"
  }
}

plugins {
  # ── DataStore ────────────────────────────────────────────────────────────
  # Postgres : reuses faso-postgres container, schema spire_server.
  # SPIRE_POSTGRES_URL injected at runtime (Vault Agent / podman secret).
  # Format: postgresql://spire:<password>@faso-postgres:5432/spire_server?sslmode=require
  DataStore "sql" {
    plugin_data {
      database_type       = "postgres"
      connection_string   = "${SPIRE_POSTGRES_URL}"
      max_open_conns      = 10
      max_idle_conns      = 5
      conn_max_lifetime   = "300s"
    }
  }

  # ── KeyManager ───────────────────────────────────────────────────────────
  # dev: disk  |  prod: replace with vault_transit block (see comment below)
  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }
  # prod KeyManager (vault_transit) — uncomment and replace disk block:
  # KeyManager "vault_transit" {
  #   plugin_cmd  = "/opt/spire/plugins/vault_transit"
  #   plugin_data {
  #     vault_addr   = "${VAULT_ADDR}"
  #     token        = "${VAULT_TOKEN}"
  #     transit_path = "transit"
  #     key_name     = "spire-server"
  #   }
  # }

  # ── NodeAttestor : join_token (dev/CI) ───────────────────────────────────
  # Used for local bootstrap via bootstrap.sh.
  NodeAttestor "join_token" {
    plugin_data {}
  }

  # ── NodeAttestor : k8s_psat (prod) ───────────────────────────────────────
  # Projected Service Account Tokens — no long-lived bootstrap token needed.
  NodeAttestor "k8s_psat" {
    plugin_data {
      clusters = {
        "faso-prod" = {
          service_account_allow_list = ["spire:spire-agent"]
          kube_config_file           = ""         # in-cluster auth
          audience                   = ["spire-server"]
        }
      }
    }
  }

  # ── UpstreamAuthority ────────────────────────────────────────────────────
  # dev: self-signed disk CA.  prod: swap to vault_pki.
  UpstreamAuthority "disk" {
    plugin_data {
      cert_file_path = "/opt/spire/conf/server/ca.crt"
      key_file_path  = "/opt/spire/conf/server/ca.key"
    }
  }
}

# ── Registration API (loopback only) ──────────────────────────────────────
# External federation will use port 8082 (future SPIFFE federation).
# Registration API is on 8081 bound above; federation endpoint below:
federation {
  bundle_endpoint {
    address = "0.0.0.0"
    port    = 8082
  }
}

# ── Health checks ─────────────────────────────────────────────────────────
health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8082"
  live_path        = "/live"
  ready_path       = "/ready"
}

# ── Telemetry ─────────────────────────────────────────────────────────────
telemetry {
  Prometheus {
    port = 9988
  }
}
