# FASO DIGITALISATION — Gitleaks custom configuration
# Extends default ruleset with project-specific allowlists
# Docs: https://github.com/gitleaks/gitleaks

title = "FASO DIGITALISATION gitleaks config"

[extend]
# Inherit the default gitleaks ruleset
useDefault = true

[[allowlists]]
description = "SPDX pre-commit hook definition file — contains no real secrets"
paths = [
  '''.pre-commit-spdx\.yaml''',
]

[[allowlists]]
description = "Test fixtures — mock/dummy credentials for unit and integration tests"
paths = [
  '''tests?/fixtures?/''',
  '''test-data/''',
  '''testdata/''',
  '''__fixtures__/''',
  '''spec/fixtures?/''',
]

[[allowlists]]
description = "Example and template files — placeholder values only"
paths = [
  '''.*\.example$''',
  '''.*\.template$''',
  '''.*\.example\.(yml|yaml|json|toml|env)$''',
  '''.*\.template\.(yml|yaml|json|toml|env)$''',
  '''\.(env|config)\.example$''',
]

[[allowlists]]
description = "Documentation references to secret patterns (quoted examples)"
regexes = [
  '''REPLACE_ME''',
  '''<YOUR_.*>''',
  '''CHANGE_THIS''',
  '''\$\{.*\}''',   # shell variable placeholders
  '''{{.*}}''',     # template placeholders
]

[[allowlists]]
description = "ARMAGEDDON mTLS test fixtures — self-signed EC keys generated for unit tests only, never used in production. See fixtures.rs header comment."
paths = [
  '''armageddon/.*/src/fixtures\.rs''',
  '''armageddon/.*/tests?/fixtures?/.*''',
]
# Note: after BFG history rewrite, the inline private key will be replaced by
# a runtime-generated key (rcgen). This allowlist covers only the remaining
# certificate PEM constants (CA cert, workload cert) which contain no private key material.

[[allowlists]]
description = "E2E seed data — test passwords in seed files must come from E2E_TEST_PASSWORD env var. This allowlist suppresses false positives on the variable reference and on generic placeholder patterns in test data files."
paths = [
  '''poulets-platform/e2e/data/.*''',
  '''poulets-platform/e2e/fixtures/.*''',
]
regexes = [
  # Generic test values that are not real credentials
  '''Test1234''',
  # Env var reference (not a hardcoded secret)
  '''E2E_TEST_PASSWORD''',
  '''TEST_PASSWORD''',
]

[[allowlists]]
description = "Vault policy HCL files — paths like auth/token/renew-self are Vault API paths, not secrets"
paths = [
  '''vault/policies/.*\.hcl''',
  '''vault/.*policy.*\.hcl''',
]

[[allowlists]]
description = "Shell scripts using openssl for key generation — the commands generate keys but do not embed them"
paths = [
  '''scripts/.*\.sh''',
  '''vault/scripts/.*\.sh''',
]
regexes = [
  # Dynamic generation — not embedded secrets
  '''\$\(openssl''',
  '''\$\(vault write''',
  '''\$\(jq -r''',
]

[[allowlists]]
description = "CI/CD workflows — GitHub Actions secrets references (not real values)"
paths = [
  '''\.github/workflows/.*\.(yml|yaml)''',
]
regexes = [
  # GitHub Actions secrets are never real values
  '''\$\{\{ secrets\..* \}\}''',
]
