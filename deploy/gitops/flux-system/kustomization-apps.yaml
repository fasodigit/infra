# Application layer — armageddon, auth-ms, poulets-api, notifier-ms
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  timeout: 10m
  dependsOn:
    - name: infra
  sourceRef:
    kind: GitRepository
    name: faso-infra
  path: ./deploy/helm
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: armageddon
      namespace: gateway
    - apiVersion: apps/v1
      kind: Deployment
      name: auth-ms
      namespace: apps
    - apiVersion: apps/v1
      kind: Deployment
      name: poulets-api
      namespace: apps
    - apiVersion: apps/v1
      kind: Deployment
      name: notifier-ms
      namespace: apps
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
