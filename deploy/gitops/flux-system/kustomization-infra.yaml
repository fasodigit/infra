# Infrastructure layer — cert-manager, ingress-nginx, SPIRE, Vault, ORY
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: faso-infra
  path: ./deploy/helm
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: kaya
      namespace: kaya
    - apiVersion: apps/v1
      kind: Deployment
      name: ory-stack-kratos
      namespace: ory-stack
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
