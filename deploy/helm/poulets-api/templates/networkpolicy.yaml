{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "poulets-api.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poulets-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "poulets-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress from ARMAGEDDON gateway on HTTP (8901) + gRPC (8702)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "poulets-api.fullname" . }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poulets-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "poulets-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: armageddon
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: gateway
      ports:
        - protocol: TCP
          port: 8901
        - protocol: TCP
          port: 8702
---
# Allow Prometheus scrape on actuator port 9001
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "poulets-api.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poulets-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "poulets-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9001
---
# Allow egress to auth-ms, postgres, kaya, redpanda, vault, consul, DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "poulets-api.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poulets-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "poulets-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # auth-ms (HTTP + gRPC)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-ms
      ports:
        - protocol: TCP
          port: 8801
        - protocol: TCP
          port: 8702
    # PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # KAYA (RESP3)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kaya
      ports:
        - protocol: TCP
          port: 6380
    # Redpanda (Kafka protocol)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    # Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # Consul
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: consul
      ports:
        - protocol: TCP
          port: 8500
    # DNS (CoreDNS)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
