apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaya.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.respPort }}
      targetPort: resp
      protocol: TCP
      name: resp
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "kaya.selectorLabels" . | nindent 4 }}
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaya.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.respPort }}
      targetPort: resp
      protocol: TCP
      name: resp
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "kaya.selectorLabels" . | nindent 4 }}
