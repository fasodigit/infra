{{- if .Values.networkPolicy.enabled }}
# Deny all ingress/egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow RESP from app namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-resp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: app
      ports:
        - protocol: TCP
          port: 6380
---
# Allow Prometheus scrape from observability namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 6381
---
# Allow DNS egress (CoreDNS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
