{{- if .Values.networkPolicy.enabled }}
# Deny all ingress/egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow RESP3 + gRPC from app namespaces and gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-resp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: app
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: gateway
      ports:
        - protocol: TCP
          port: 6380
        - protocol: TCP
          port: 6381
---
# Allow Prometheus scrape from observability namespace on metrics port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9100
---
# Allow inter-pod communication for cluster bus (Raft) + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaya.fullname" . }}-allow-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaya.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaya.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "kaya.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6382
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "kaya.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6382
        - protocol: TCP
          port: 6380
    # DNS (CoreDNS)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
