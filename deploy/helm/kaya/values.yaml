# Default values for KAYA — FASO DIGITALISATION
# Ports per port-policy.yaml: 6380 (RESP3), 6381 (gRPC), 9100 (metrics)

replicaCount: 3

image:
  repository: registry.faso.gov.bf/faso/kaya
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: faso-registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9100"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 9000
  fsGroup: 9000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  respPort: 6380
  grpcPort: 6381
  metricsPort: 9100

persistence:
  storageClass: "csi-ovh-block"
  size: 20Gi
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "4000m"
    memory: "4Gi"

# Graceful shutdown: 60s for WAL flush + connection drain
terminationGracePeriodSeconds: 60

livenessProbe:
  tcpSocket:
    port: 6380
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  exec:
    command: ["/usr/local/bin/kaya-cli", "ping"]
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 2
  timeoutSeconds: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

podMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

networkPolicy:
  enabled: true

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

vault:
  enabled: true
  role: kaya

consul:
  enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kaya
        topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []

env:
  - name: KAYA_RESP_ADDR
    value: "0.0.0.0:6380"
  - name: KAYA_GRPC_ADDR
    value: "0.0.0.0:6381"
  - name: KAYA_METRICS_ADDR
    value: "0.0.0.0:9100"
  - name: KAYA_DATA_DIR
    value: "/data"
  - name: RUST_LOG
    value: "kaya=info"
