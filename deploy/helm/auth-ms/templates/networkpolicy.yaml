{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-ms.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "auth-ms.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress from ARMAGEDDON gateway on HTTP (8801) + gRPC (8702)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-ms.fullname" . }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "auth-ms.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: armageddon
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: gateway
      ports:
        - protocol: TCP
          port: 8801
        - protocol: TCP
          port: 8702
---
# Allow Prometheus scrape on actuator port 9002
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-ms.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "auth-ms.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9002
---
# Allow egress to postgres, kaya, kratos, keto, vault, consul, DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-ms.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "auth-ms.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # KAYA (RESP3)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kaya
      ports:
        - protocol: TCP
          port: 6380
    # Kratos public + admin
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ory-stack
      ports:
        - protocol: TCP
          port: 4433
        - protocol: TCP
          port: 4434
    # Keto read
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ory-stack
      ports:
        - protocol: TCP
          port: 4466
    # Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # Consul
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: consul
      ports:
        - protocol: TCP
          port: 8500
    # DNS (CoreDNS)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
