apiVersion: v1
kind: Service
metadata:
  name: {{ include "auth-ms.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "auth-ms.selectorLabels" . | nindent 4 }}
