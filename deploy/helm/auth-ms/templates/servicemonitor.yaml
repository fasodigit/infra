{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "auth-ms.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-ms.labels" . | nindent 4 }}
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      {{- include "auth-ms.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      # Actuator metrics are on a separate port; use targetPort override
      # ServiceMonitor scrapes via the Service, so we define a dedicated
      # actuator port below
      path: /actuator/prometheus
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
  # Note: Prometheus scrapes via pod IP on port 9002 since actuator is not
  # exposed through the main Service. Use podMonitorEndpoints or add actuator
  # port to Service if needed.
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
