# Default values for notifier-ms — FASO DIGITALISATION
# Ports per port-policy.yaml: 8803 (HTTP), 9003 (actuator/loopback)

replicaCount: 2

image:
  repository: registry.faso.gov.bf/faso/notifier-ms
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: faso-registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9003"
  prometheus.io/path: "/actuator/prometheus"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8803

resources:
  requests:
    cpu: "250m"
    memory: "384Mi"
  limits:
    cpu: "1000m"
    memory: "768Mi"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Graceful shutdown: 40s termination + 5s preStop sleep for LB drain
terminationGracePeriodSeconds: 40

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: actuator
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: actuator
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 2
  timeoutSeconds: 3

startupProbe:
  httpGet:
    path: /actuator/health
    port: actuator
  failureThreshold: 30
  periodSeconds: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

vault:
  enabled: true
  role: notifier-ms

consul:
  enabled: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: notifier-ms

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notifier-ms
          topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: SERVER_PORT
    value: "8803"
  - name: MANAGEMENT_SERVER_PORT
    value: "9003"
  - name: JAVA_OPTS
    value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}
