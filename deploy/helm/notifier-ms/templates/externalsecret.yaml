{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "notifier-ms.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notifier-ms.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "notifier-ms.fullname" . }}-vault
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: faso/notifier-ms/database
        property: url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: faso/notifier-ms/database
        property: username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: faso/notifier-ms/database
        property: password
    - secretKey: KAYA_PASSWORD
      remoteRef:
        key: faso/notifier-ms/kaya
        property: password
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: faso/notifier-ms/smtp
        property: password
    - secretKey: REDPANDA_SASL_PASSWORD
      remoteRef:
        key: faso/notifier-ms/redpanda
        property: password
{{- end }}
