{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "poulets-bff.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poulets-bff.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "poulets-bff.fullname" . }}-vault
    creationPolicy: Owner
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: faso/poulets-bff/nextauth
        property: secret
    - secretKey: KRATOS_API_KEY
      remoteRef:
        key: faso/poulets-bff/kratos
        property: api_key
{{- end }}
