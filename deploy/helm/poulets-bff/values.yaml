# Default values for poulets-bff (Next.js) — FASO DIGITALISATION
# Ports per port-policy.yaml: 4800 (HTTP)

replicaCount: 2

image:
  repository: registry.faso.gov.bf/faso/poulets-bff
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: faso-registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 4800

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Graceful shutdown: 30s for connection drain
terminationGracePeriodSeconds: 30

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 2
  timeoutSeconds: 3

startupProbe:
  httpGet:
    path: /api/health
    port: http
  failureThreshold: 15
  periodSeconds: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

vault:
  enabled: true
  role: poulets-bff

consul:
  enabled: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: poulets-bff

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: poulets-bff
          topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "4800"
  - name: AUTH_MS_URL
    value: "http://auth-ms:8801"
  - name: POULETS_API_URL
    value: "http://poulets-api:8901"
  - name: KRATOS_PUBLIC_URL
    value: "http://kratos:4433"

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: nextjs-cache
    mountPath: /app/.next/cache

volumes:
  - name: tmp
    emptyDir: {}
  - name: nextjs-cache
    emptyDir: {}
