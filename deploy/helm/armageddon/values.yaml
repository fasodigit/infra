# Default values for ARMAGEDDON gateway — FASO DIGITALISATION
# Ports per port-policy.yaml: 8080 (HTTP/HTTPS), 4433 (QUIC), 9903 (admin, loopback)

replicaCount: 2

image:
  repository: registry.faso.gov.bf/faso/armageddon
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: faso-registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9903"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8080
  quicPort: 4433
  adminPort: 9903

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  hosts:
    - host: api.faso.gov.bf
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: armageddon-tls
      hosts:
        - api.faso.gov.bf

resources:
  requests:
    cpu: "500m"
    memory: "256Mi"
  limits:
    cpu: "2000m"
    memory: "512Mi"

# Graceful shutdown: 30s for in-flight request drain
terminationGracePeriodSeconds: 30

livenessProbe:
  httpGet:
    path: /health/live
    port: admin
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: admin
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 2
  timeoutSeconds: 3

startupProbe:
  httpGet:
    path: /health/live
    port: admin
  failureThreshold: 15
  periodSeconds: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: "15s"
  scrapeTimeout: "10s"

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

vault:
  enabled: true
  role: armageddon

consul:
  enabled: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: armageddon

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: armageddon
        topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []

env:
  - name: ARMAGEDDON_LISTEN_ADDR
    value: "0.0.0.0:8080"
  - name: ARMAGEDDON_QUIC_ADDR
    value: "0.0.0.0:4433"
  - name: ARMAGEDDON_ADMIN_ADDR
    value: "127.0.0.1:9903"
  - name: RUST_LOG
    value: "armageddon=info,pingora=warn"

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}
