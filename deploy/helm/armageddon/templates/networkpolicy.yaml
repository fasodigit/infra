{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "armageddon.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "armageddon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "armageddon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress from internet (via ingress controller) on HTTP (8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "armageddon.fullname" . }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "armageddon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "armageddon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # From ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # QUIC ingress (UDP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: UDP
          port: 4433
---
# Allow Prometheus scrape on admin port 9903
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "armageddon.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "armageddon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "armageddon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9903
---
# Allow egress to all backend services, kaya, consul, vault, xds, DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "armageddon.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "armageddon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "armageddon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Backend services (auth-ms, poulets-api, notifier-ms, poulets-bff)
    - to:
        - namespaceSelector:
            matchLabels:
              faso.gov.bf/tier: app
      ports:
        - protocol: TCP
          port: 8801
        - protocol: TCP
          port: 8901
        - protocol: TCP
          port: 8803
        - protocol: TCP
          port: 8702
        - protocol: TCP
          port: 4800
    # KAYA (RESP3 + gRPC)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kaya
      ports:
        - protocol: TCP
          port: 6380
        - protocol: TCP
          port: 6381
    # Consul
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: consul
      ports:
        - protocol: TCP
          port: 8500
    # Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # xDS controller
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: xds
      ports:
        - protocol: TCP
          port: 18000
    # DNS (CoreDNS)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
