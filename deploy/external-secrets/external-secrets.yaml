# ExternalSecret resources — maps Vault KV paths to Kubernetes Secrets
---
# Kaya credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kaya-credentials
  namespace: kaya
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-faso
    kind: ClusterSecretStore
  target:
    name: kaya-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: kaya-password
      remoteRef:
        key: faso/kaya
        property: password
---
# Armageddon secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: armageddon-secrets
  namespace: gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-faso
    kind: ClusterSecretStore
  target:
    name: armageddon-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: faso/armageddon
        property: jwt-secret
    - secretKey: kaya-password
      remoteRef:
        key: faso/kaya
        property: password
---
