# -----------------------------------------------------------------------------
# FASO DIGITALISATION - Redpanda topics and retention policy (v3.1 sovereign)
# -----------------------------------------------------------------------------
# Consumed by `rpk` bootstrap scripts or by the companion Terraform module
# terraform-redpanda-topics. Retention values are normative and derived from
# POLICY-SCHEMA-REGISTRY-v3.1.md - section 11 and 12.
#
# Conventions:
#   - replication factor is always 3 (RF=3 RAFT, sovereign requirement)
#   - partitions sized per expected throughput, not per tenant
#   - retention.ms uses milliseconds; -1 means infinite (bounded only by storage)
#   - segment.ms is ISO-ish in milliseconds (1d = 86_400_000)
#   - cleanup.policy: "delete" (default) or "compact,delete" (state topics)
# -----------------------------------------------------------------------------

defaults:
  replication_factor: 3
  min_insync_replicas: 2
  compression_type: zstd
  schema_registry:
    compatibility: BACKWARD_TRANSITIVE
    format: protobuf

retention_aliases:
  90d: 7776000000        #  90 * 86_400_000
  1y:  31536000000
  2y:  63072000000
  3y:  94608000000
  5y:  157680000000
  7y:  220752000000
  10y: 315360000000

topics:

  # ===== ETAT-CIVIL (retention 5 ans pour les flux demandes ; 10 ans audit) ===
  - name: ec.demande.created.v1
    partitions: 12
    config:
      cleanup.policy: delete
      retention.ms: 157680000000   # 5y
      segment.ms: 604800000        # 7d
  - name: ec.demande.validated.v1
    partitions: 12
    config:
      cleanup.policy: delete
      retention.ms: 157680000000
      segment.ms: 604800000
  - name: ec.acte.signed.v1
    partitions: 12
    config:
      cleanup.policy: delete
      retention.ms: 157680000000
      segment.ms: 604800000
  - name: ec.acte.state.v1
    partitions: 12
    config:
      cleanup.policy: compact,delete
      retention.ms: -1
      segment.ms: 86400000         # 1d
  - name: ec.audit-trail.v1
    partitions: 24
    config:
      cleanup.policy: delete
      retention.ms: 315360000000   # 10y
      segment.ms: 2592000000       # 30d

