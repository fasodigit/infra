# -----------------------------------------------------------------------------
# Bootstrap script (generated example) - run once per cluster
# -----------------------------------------------------------------------------
# for each topic in topics:
#   rpk topic create <topic.name> \
#       --partitions <topic.partitions> \
#       --replicas 3 \
#       --config cleanup.policy=<topic.config.cleanup.policy> \
#       --config retention.ms=<topic.config.retention.ms> \
#       --config segment.ms=<topic.config.segment.ms> \
#       --config compression.type=zstd \
#       --config min.insync.replicas=2
# -----------------------------------------------------------------------------
