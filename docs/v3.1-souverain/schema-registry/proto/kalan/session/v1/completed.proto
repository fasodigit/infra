syntax = "proto3";

// FASO-KALAN — a learning session is completed.
// Topic: kalan.session.completed.v1

package faso.kalan.session.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/kalan/session/v1;sessionv1";
option java_package = "bf.faso.schemas.kalan.session.v1";
option java_multiple_files = true;

message SessionCompleted {
  // UUID of the session.
  string session_id = 1;

  // UUID of the tenant.
  string tenant_id = 2;

  // UUID of the learner.
  string learner_id = 3;

  // UUID of the course.
  string course_id = 4;

  // UUID of the lesson completed.
  string lesson_id = 5;

  // When the session ended.
  google.protobuf.Timestamp completed_at = 6;

  // Effective duration in seconds spent on this lesson.
  int64 duration_seconds = 7;

  // Score obtained (0..10000, i.e. basis points of 100%).
  int32 score_bp = 8;

  // Whether the pass threshold was reached.
  bool passed = 9;

  // Idempotency key.
  string idempotency_key = 10;

  reserved 11 to 20;
}
