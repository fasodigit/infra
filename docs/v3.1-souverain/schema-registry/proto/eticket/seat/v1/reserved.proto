syntax = "proto3";

// E-TICKET — a seat is reserved (numbered transport or event).
// Topic: eticket.seat.reserved.v1

package faso.eticket.seat.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/eticket/seat/v1;seatv1";
option java_package = "bf.faso.schemas.eticket.seat.v1";
option java_multiple_files = true;

message SeatReserved {
  // UUID of the seat reservation.
  string reservation_id = 1;

  // UUID of the tenant.
  string tenant_id = 2;

  // UUID of the event / trip.
  string event_id = 3;

  // UUID of the ticket that owns this seat.
  string ticket_id = 4;

  // Seat code: "A-12", "B-05"... (functional, not PII).
  string seat_code = 5;

  // When the reservation was confirmed.
  google.protobuf.Timestamp reserved_at = 6;

  // Hard TTL after which the reservation expires if not validated.
  google.protobuf.Timestamp expires_at = 7;

  // Idempotency key.
  string idempotency_key = 8;

  reserved 9 to 15;
}
