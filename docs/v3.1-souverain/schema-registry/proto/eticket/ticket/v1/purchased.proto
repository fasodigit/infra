syntax = "proto3";

// E-TICKET — a ticket is purchased (bus, event, administrative queue).
// Topic: eticket.ticket.purchased.v1

package faso.eticket.ticket.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/eticket/ticket/v1;ticketv1";
option java_package = "bf.faso.schemas.eticket.ticket.v1";
option java_multiple_files = true;

message TicketPurchased {
  // UUID of the ticket.
  string ticket_id = 1;

  // UUID of the tenant (operator / event organizer).
  string tenant_id = 2;

  // When the purchase was confirmed.
  google.protobuf.Timestamp purchased_at = 3;

  // UUID of the buyer (opaque).
  string buyer_id = 4;

  // UUID of the event or route (trip, concert, administrative service).
  string event_id = 5;

  // Price in CFA cents (int64 to avoid float rounding).
  int64 price_cents = 6;

  // ISO 4217 currency code — always "XOF" on the sovereign platform.
  string currency = 7;

  // Channel: "WEB", "MOBILE", "USSD", "KIOSK".
  string channel = 8;

  // UUID of the payment intent (bridge to vouchers/mobile money).
  string payment_intent_id = 9;

  // Idempotency key.
  string idempotency_key = 10;

  reserved 11 to 20;
  reserved "nom_acheteur", "tel_acheteur", "email";
}
