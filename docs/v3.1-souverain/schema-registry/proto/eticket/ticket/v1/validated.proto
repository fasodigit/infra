syntax = "proto3";

// E-TICKET — a ticket is scanned / validated at the gate.
// Topic: eticket.ticket.validated.v1

package faso.eticket.ticket.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/eticket/ticket/v1;ticketv1";
option java_package = "bf.faso.schemas.eticket.ticket.v1";
option java_multiple_files = true;

message TicketValidated {
  // UUID of the ticket.
  string ticket_id = 1;

  // UUID of the tenant.
  string tenant_id = 2;

  // When the gate-scan happened.
  google.protobuf.Timestamp validated_at = 3;

  // UUID of the gate / device that performed the scan.
  string gate_id = 4;

  // UUID of the controlling agent (if human controller).
  optional string controller_id = 5;

  // Outcome: "ACCEPTED", "REJECTED_ALREADY_USED", "REJECTED_EXPIRED",
  //          "REJECTED_WRONG_EVENT", "REJECTED_HMAC_INVALID".
  string outcome = 6;

  // Idempotency key.
  string idempotency_key = 7;

  reserved 8 to 15;
}
