syntax = "proto3";

// ALT-MISSION — a mission order is approved by hierarchy.
// Topic: alt.mission.approved.v1

package faso.alt.mission.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/alt/mission/v1;missionv1";
option java_package = "bf.faso.schemas.alt.mission.v1";
option java_multiple_files = true;

message MissionApproved {
  // UUID of the mission.
  string mission_id = 1;

  // UUID of the tenant.
  string tenant_id = 2;

  // UUID of the approver.
  string approver_id = 3;

  // Approval level: "N+1", "N+2", "DIRECTEUR", "MINISTRE".
  string approval_level = 4;

  // When the approval was signed.
  google.protobuf.Timestamp approved_at = 5;

  // Final approved amount (CFA cents), may differ from the estimate.
  int64 approved_amount_cents = 6;

  // Digital signature of the approval decision.
  bytes signature = 7;

  // Idempotency key.
  string idempotency_key = 8;

  reserved 9 to 15;
}
