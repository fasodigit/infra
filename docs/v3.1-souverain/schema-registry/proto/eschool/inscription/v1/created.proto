syntax = "proto3";

// E-SCHOOL — a school inscription is submitted.
// Topic: eschool.inscription.created.v1

package faso.eschool.inscription.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/faso/schemas/eschool/inscription/v1;inscriptionv1";
option java_package = "bf.faso.schemas.eschool.inscription.v1";
option java_multiple_files = true;

message InscriptionCreated {
  // UUID of the inscription.
  string inscription_id = 1;

  // UUID of the tenant (school / academy).
  string tenant_id = 2;

  // UUID of the pupil (opaque; civil identity in Yugabyte).
  string pupil_id = 3;

  // UUID of the guardian account that submitted the request.
  string guardian_id = 4;

  // School year label: "2026-2027".
  string school_year = 5;

  // Target level: "CP1", "CE1", "6EME", "TERMINALE_D"...
  string target_level = 6;

  // UUID of the desired classroom (null if auto-assigned).
  optional string desired_classroom_id = 7;

  // When the inscription request was submitted.
  google.protobuf.Timestamp created_at = 8;

  // Channel: "WEB", "MOBILE", "AGENT_GUICHET".
  string channel = 9;

  // Idempotency key.
  string idempotency_key = 10;

  reserved 11 to 20;
  reserved "nom_eleve", "prenom_eleve", "date_naissance_eleve", "adresse";
}
