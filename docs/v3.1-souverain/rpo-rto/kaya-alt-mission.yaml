# =============================================================================
# KAYA — Tenant ALT-MISSION (code tenant : alt)
# -----------------------------------------------------------------------------
# RPO/RTO cibles (voir MATRICE-RPO-RTO-v3.1.md) :
#   - Soumissions ordres de mission           : RPO ≤ 5 s      | RTO = 4 h
#   - Validations hiérarchiques               : RPO ≤ 5 s      | RTO = 4 h
#   - Décompte indemnités                     : RPO ≤ 5 s      | RTO = 4 h
#
# Obligation légale BF : rétention pièces 5 ans (Cour des Comptes).
# Signataire métier : DRH Fonction Publique.
# Criticité C — flux internes entièrement re-soumissibles.
# =============================================================================

include: kaya-common.yaml

tenant:
  code: "alt"
  project: "alt-mission"
  display_name: "FASO ALT-Mission"
  criticality: "C"
  legal_retention_years: 5

persistence:
  default_mode: "async-1s"
  policies:
    - name: "missions"
      match: "tenant-alt:mission:*"
      mode: "async-1s"
    - name: "validations"
      match: "tenant-alt:valid:*"
      mode: "async-1s"
    - name: "indemnites"
      match: "tenant-alt:indem:*"
      mode: "async-1s"
    - name: "sessions"
      match: "tenant-alt:sess:*"
      mode: "async-1s"
  snapshot:
    frequency: "15m"                  # RTO 4h → cadence détendue
    retention_count: 96               # 24h
    retention_days: 14
  encryption:
    backend: "luks2"
    kek_vault_path: "transit/kaya/alt/kek"
    kek_rotation_period: "365d"
    backup_kek_vault_path: "transit/kaya-backup/alt/kek"

acl:
  users:
    - username: "alt_mission_svc"
      password_file: "/run/vault/secrets/kaya/alt/password"
      key_patterns:
        - "~tenant-alt:*"
      allow_commands:
        - "+@read"
        - "+@write"
        - "+eval"
        - "+evalsha"
        - "+bf.*"
        - "+xadd"
        - "+xreadgroup"
        - "+xack"
        - "+xpending"
      deny_commands:
        - "-keys"
        - "-flushall"
        - "-flushdb"
        - "-config"
        - "-debug"
        - "-shutdown"
      channels: "resetchannels"

replication:
  mode: "async"
  replicas_count: 3
  off_site_required: false
  topology:
    - id: "replica-ouaga-1"
      zone: "ouaga-a"
      off_site: false
    - id: "replica-ouaga-2"
      zone: "ouaga-b"
      off_site: false
    - id: "replica-ouaga-3"
      zone: "ouaga-c"
      off_site: false
  lag_alert_threshold_ms: 2000

# -----------------------------------------------------------------------------
# Bloom filters — volumétrie estimée (extrapolation : 50 000 missions/an).
# Non spécifié dans la matrice de référence ; dimensionnement conservatif.
# -----------------------------------------------------------------------------
bloom_filters:
  preallocate_on_boot: true
  reserves:
    - name: "bf:tenant-alt:missions:soumises"
      capacity: 50000
      error_rate: 0.01
      expansion: 2

network:
  resp3:
    listen: "0.0.0.0:6380"
  grpc:
    listen: "0.0.0.0:6381"
  tls:
    enabled: true
    cert_file: "/run/vault/secrets/kaya/alt/tls/cert.pem"
    key_file: "/run/vault/secrets/kaya/alt/tls/key.pem"
    ca_file: "/run/vault/secrets/kaya/alt/tls/ca.pem"

maxmemory: "2GB"
maxmemory_policy: "allkeys-lru"

observability:
  metrics:
    listen: "127.0.0.1:9121"
    labels:
      tenant: "alt"
      project: "alt-mission"
      criticality: "C"
