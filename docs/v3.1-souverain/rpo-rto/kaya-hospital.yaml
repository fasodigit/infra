# =============================================================================
# KAYA — Tenant HOSPITAL (code tenant : hosp)
# -----------------------------------------------------------------------------
# RPO/RTO cibles (voir MATRICE-RPO-RTO-v3.1.md) :
#   - Prescriptions / ordonnances signées     : RPO = 0 s      | RTO = 5 min
#   - Résultats examens validés biologiste    : RPO = 0 s      | RTO = 5 min
#   - Admissions / pré-admissions             : RPO ≤ 1 s      | RTO = 5 min
#   - Sessions soignants / file d'attente     : RPO ≤ 5 s      | RTO = 5 min
#
# Obligation légale BF : secret médical, rétention 10 ans (20 ans pour mineurs).
# Signataire métier : SG MinSanté + DSIH.
# Criticité MAXIMALE — RTO 5 min = le plus court de l'écosystème.
# =============================================================================

include: kaya-common.yaml

tenant:
  code: "hosp"
  project: "hospital"
  display_name: "FASO Santé / Hospital"
  criticality: "A"
  legal_retention_years: 10
  legal_retention_minors_years: 20

persistence:
  default_mode: "async-1s"
  policies:
    - name: "prescriptions-signees"
      match: "tenant-hosp:presc:*"
      mode: "sync"
      wal_group_commit_max_us: 150    # plus agressif pour RTO 5 min
    - name: "ordonnances-signees"
      match: "tenant-hosp:ordo:*"
      mode: "sync"
      wal_group_commit_max_us: 150
    - name: "resultats-valides"
      match: "tenant-hosp:resultat:*"
      mode: "sync"
      wal_group_commit_max_us: 150
    - name: "admissions"
      match: "tenant-hosp:adm:*"
      mode: "async-1s"
    - name: "lits"
      match: "tenant-hosp:lit:*"
      mode: "async-1s"
    - name: "sessions"
      match: "tenant-hosp:sess:*"
      mode: "async-1s"
  snapshot:
    frequency: "2m"                   # plus fréquent pour RTO 5 min
    retention_count: 360              # 12h glissantes à 2 min
    retention_days: 30
  encryption:
    backend: "luks2"
    kek_vault_path: "transit/kaya/hosp/kek"
    kek_rotation_period: "365d"
    backup_kek_vault_path: "transit/kaya-backup/hosp/kek"

acl:
  users:
    - username: "hospital_svc"
      password_file: "/run/vault/secrets/kaya/hosp/password"
      key_patterns:
        - "~tenant-hosp:*"
      allow_commands:
        - "+@read"
        - "+@write"
        - "+eval"
        - "+evalsha"
        - "+bf.*"
        - "+xadd"
        - "+xreadgroup"
        - "+xack"
        - "+xpending"
      deny_commands:
        - "-keys"
        - "-flushall"
        - "-flushdb"
        - "-config"
        - "-debug"
        - "-shutdown"
      channels: "resetchannels"

replication:
  mode: "async"
  replicas_count: 3
  off_site_required: true
  topology:
    - id: "replica-ouaga-chu-ybn"
      zone: "ouaga-a"
      off_site: false
    - id: "replica-ouaga-chu-bgd"
      zone: "ouaga-b"
      off_site: false
    - id: "replica-bobo-chu-sss"
      zone: "bobo-dioulasso"
      off_site: true
  lag_alert_threshold_ms: 100         # seuil plus strict (criticité max)

# -----------------------------------------------------------------------------
# Bloom filters — volumétrie annuelle : 500 000 prescriptions, FP 0.01 %
# -----------------------------------------------------------------------------
bloom_filters:
  preallocate_on_boot: true
  reserves:
    - name: "bf:tenant-hosp:prescriptions:actives"
      capacity: 500000
      error_rate: 0.0001              # 0.01 % — crucial vs double-prescription
      expansion: 2
    - name: "bf:tenant-hosp:admissions:jour"
      capacity: 10000
      error_rate: 0.001
      expansion: 2
    - name: "bf:tenant-hosp:resultats:valides"
      capacity: 300000
      error_rate: 0.0001
      expansion: 2

network:
  resp3:
    listen: "0.0.0.0:6380"
  grpc:
    listen: "0.0.0.0:6381"
  tls:
    enabled: true
    cert_file: "/run/vault/secrets/kaya/hosp/tls/cert.pem"
    key_file: "/run/vault/secrets/kaya/hosp/tls/key.pem"
    ca_file: "/run/vault/secrets/kaya/hosp/tls/ca.pem"

maxmemory: "8GB"                      # le plus gros tenant (volumétrie + criticité)
maxmemory_policy: "noeviction"

observability:
  metrics:
    listen: "127.0.0.1:9121"
    labels:
      tenant: "hosp"
      project: "hospital"
      criticality: "A"
      rto_minutes: "5"
