# =============================================================================
# KAYA — Tenant SOGESY (code tenant : soge)
# -----------------------------------------------------------------------------
# RPO/RTO cibles (voir MATRICE-RPO-RTO-v3.1.md) :
#   - Émission boarding pass signé            : RPO = 0 s      | RTO = 15 min
#   - Check-in validé                         : RPO = 0 s      | RTO = 15 min
#   - Déduplication scans embarquement        : RPO ≤ 1 s      | RTO = 15 min
#   - Suivi bagages                           : RPO ≤ 1 s      | RTO = 15 min
#   - File d'attente comptoir                 : RPO ≤ 5 s      | RTO = 15 min
#
# Obligation légale BF/international : Annexe 17 OACI (sûreté aérienne),
# Code de l'aviation civile BF. Rétention manifestes : 5 ans.
# Signataire métier : DG Aviation Civile + opérateur aéroportuaire ADB.
# =============================================================================

include: kaya-common.yaml

tenant:
  code: "soge"
  project: "sogesy"
  display_name: "FASO Sogesy (Aviation)"
  criticality: "A"
  legal_retention_years: 5

persistence:
  default_mode: "async-1s"
  policies:
    - name: "boarding-pass-emis"
      match: "tenant-soge:boarding:*"
      mode: "sync"                    # fsync always — titre de transport
      wal_group_commit_max_us: 200
    - name: "checkin-valides"
      match: "tenant-soge:checkin:*"
      mode: "sync"
      wal_group_commit_max_us: 200
    - name: "scans-embarquement"
      match: "tenant-soge:scan:*"
      mode: "async-1s"
    - name: "bagages"
      match: "tenant-soge:bag:*"
      mode: "async-1s"
    - name: "file-attente"
      match: "tenant-soge:queue:*"
      mode: "async-1s"
  snapshot:
    frequency: "5m"
    retention_count: 288
    retention_days: 30
  encryption:
    backend: "luks2"
    kek_vault_path: "transit/kaya/soge/kek"
    kek_rotation_period: "365d"
    backup_kek_vault_path: "transit/kaya-backup/soge/kek"

acl:
  users:
    - username: "sogesy_svc"
      password_file: "/run/vault/secrets/kaya/soge/password"
      key_patterns:
        - "~tenant-soge:*"
      allow_commands:
        - "+@read"
        - "+@write"
        - "+eval"
        - "+evalsha"
        - "+bf.*"
        - "+xadd"
        - "+xreadgroup"
        - "+xack"
        - "+xpending"
      deny_commands:
        - "-keys"
        - "-flushall"
        - "-flushdb"
        - "-config"
        - "-debug"
        - "-shutdown"
      channels: "resetchannels"

replication:
  mode: "async"
  replicas_count: 3
  off_site_required: true             # RPO=0 → hors-site obligatoire
  topology:
    - id: "replica-aero-ouaga-1"
      zone: "aero-ouaga-a"
      off_site: false
    - id: "replica-aero-ouaga-2"
      zone: "aero-ouaga-b"
      off_site: false
    - id: "replica-aero-bobo"
      zone: "aero-bobo"
      off_site: true
  lag_alert_threshold_ms: 200

# -----------------------------------------------------------------------------
# Bloom filters — volumétrie annuelle : 1 000 000 boarding passes, FP 0.01 %
# -----------------------------------------------------------------------------
bloom_filters:
  preallocate_on_boot: true
  reserves:
    - name: "bf:tenant-soge:boarding:scanned"
      capacity: 1000000
      error_rate: 0.0001              # double-scan sûreté = inadmissible
      expansion: 2
    - name: "bf:tenant-soge:boarding:emis"
      capacity: 1000000
      error_rate: 0.0001
      expansion: 2
    - name: "bf:tenant-soge:bagages:tracked"
      capacity: 1500000
      error_rate: 0.001
      expansion: 2

network:
  resp3:
    listen: "0.0.0.0:6380"
  grpc:
    listen: "0.0.0.0:6381"
  tls:
    enabled: true
    cert_file: "/run/vault/secrets/kaya/soge/tls/cert.pem"
    key_file: "/run/vault/secrets/kaya/soge/tls/key.pem"
    ca_file: "/run/vault/secrets/kaya/soge/tls/ca.pem"

maxmemory: "4GB"
maxmemory_policy: "noeviction"        # boarding passes actifs = jamais évincés

observability:
  metrics:
    listen: "127.0.0.1:9121"
    labels:
      tenant: "soge"
      project: "sogesy"
      criticality: "A"
