#
# PostgreSQL WAL archiving configuration for FASO DIGITALISATION
#
# Include this file in your postgresql.conf or mount it as a volume:
#   include_if_exists = '/etc/postgresql/conf.d/backup.conf'
#
# The archive_command calls pg-wal-archive.sh which compresses, encrypts,
# and uploads each WAL segment to S3-compatible storage.
#
# Prerequisites:
#   - pg-wal-archive.sh must be at /scripts/pg-wal-archive.sh
#   - Environment variables for S3 + encryption must be set
#     (via Vault agent sidecar or container env)

# ---------------------------------------------------------------------------
# WAL level — required for PITR and streaming replication
# ---------------------------------------------------------------------------
wal_level = replica

# ---------------------------------------------------------------------------
# Archiving
# ---------------------------------------------------------------------------
archive_mode = on
archive_command = '/scripts/pg-wal-archive.sh %p %f'

# Force a WAL switch every 5 minutes even if not full (max data loss window)
archive_timeout = 300

# ---------------------------------------------------------------------------
# WAL retention (keep enough for replicas to catch up)
# ---------------------------------------------------------------------------
# Keep minimum 2 WAL segments (32 MB each) before recycling
wal_keep_size = 64MB

# Maximum time to wait for WAL archiving before recycling (safety net)
# Set to 0 to never recycle un-archived WAL (safest for DR)
# In practice, the archive_command should succeed within seconds.
# archive_cleanup_command is not set — we rely on S3 retention policies.

# ---------------------------------------------------------------------------
# Checkpoints (tune for backup-friendly behavior)
# ---------------------------------------------------------------------------
# Spread checkpoints over 90% of checkpoint_timeout to reduce I/O spikes
checkpoint_completion_target = 0.9

# Checkpoint every 15 minutes (default is 5 min — too frequent for large DBs)
checkpoint_timeout = 15min

# Max WAL size before forcing a checkpoint (default 1GB is fine)
max_wal_size = 1GB
min_wal_size = 256MB
