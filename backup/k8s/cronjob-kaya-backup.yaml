#
# CronJob: KAYA in-memory database hourly snapshot backup

apiVersion: batch/v1
kind: CronJob
metadata:
  name: faso-kaya-backup
  namespace: faso-backup
  labels:
    app.kubernetes.io/name: kaya-backup
    app.kubernetes.io/part-of: faso-digitalisation
    app.kubernetes.io/component: backup
spec:
  # Every hour at minute 15
  schedule: "15 * * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kaya-backup
            app.kubernetes.io/component: backup
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "faso-backup"
            vault.hashicorp.com/agent-inject-secret-s3-credentials: "faso/data/backup/s3"
            vault.hashicorp.com/agent-inject-template-s3-credentials: |
              {{- with secret "faso/data/backup/s3" -}}
              export AWS_ACCESS_KEY_ID={{ .Data.data.access_key }}
              export AWS_SECRET_ACCESS_KEY={{ .Data.data.secret_key }}
              {{- end -}}
            vault.hashicorp.com/agent-inject-secret-encryption-key: "faso/data/backup/encryption"
            vault.hashicorp.com/agent-inject-template-encryption-key: |
              {{- with secret "faso/data/backup/encryption" -}}
              {{ .Data.data.age_public_key }}
              {{- end -}}
        spec:
          serviceAccountName: faso-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: kaya-backup
              image: faso/backup-tools:latest
              command:
                - /bin/bash
                - -c
                - |
                  source /vault/secrets/s3-credentials
                  exec /scripts/kaya-backup.sh
              env:
                - name: KAYA_HOST
                  value: "faso-kaya.faso-infra.svc.cluster.local"
                - name: KAYA_PORT
                  value: "6379"
                - name: KAYA_DATA_DIR
                  value: "/kaya-data"
                - name: BACKUP_ENCRYPTION_KEY_FILE
                  value: "/vault/secrets/encryption-key"
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: faso-backup-config
                      key: s3-bucket
                - name: S3_ENDPOINT
                  valueFrom:
                    configMapKeyRef:
                      name: faso-backup-config
                      key: s3-endpoint
                - name: PUSHGATEWAY_URL
                  value: "http://prometheus-pushgateway.faso-observability.svc.cluster.local:9091"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: kaya-data
                  mountPath: /kaya-data
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            - name: scripts
              configMap:
                name: faso-backup-scripts
                defaultMode: 0755
            - name: kaya-data
              persistentVolumeClaim:
                claimName: faso-kaya-data
                readOnly: true
