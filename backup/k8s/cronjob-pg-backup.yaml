#
# CronJob: PostgreSQL full backup (weekly) + continuous WAL archiving
# WAL archiving is handled by archive_command in postgresql-backup.conf;
# this CronJob triggers weekly full (pg_basebackup) backups.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: faso-pg-backup
  namespace: faso-backup
  labels:
    app.kubernetes.io/name: pg-backup
    app.kubernetes.io/part-of: faso-digitalisation
    app.kubernetes.io/component: backup
spec:
  # Every Sunday at 03:00 UTC
  schedule: "0 3 * * 0"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: pg-backup
            app.kubernetes.io/component: backup
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "faso-backup"
            vault.hashicorp.com/agent-inject-secret-postgres-password: "faso/data/postgres"
            vault.hashicorp.com/agent-inject-template-postgres-password: |
              {{- with secret "faso/data/postgres" -}}
              {{ .Data.data.password }}
              {{- end -}}
            vault.hashicorp.com/agent-inject-secret-s3-credentials: "faso/data/backup/s3"
            vault.hashicorp.com/agent-inject-template-s3-credentials: |
              {{- with secret "faso/data/backup/s3" -}}
              export AWS_ACCESS_KEY_ID={{ .Data.data.access_key }}
              export AWS_SECRET_ACCESS_KEY={{ .Data.data.secret_key }}
              {{- end -}}
            vault.hashicorp.com/agent-inject-secret-encryption-key: "faso/data/backup/encryption"
            vault.hashicorp.com/agent-inject-template-encryption-key: |
              {{- with secret "faso/data/backup/encryption" -}}
              {{ .Data.data.age_public_key }}
              {{- end -}}
        spec:
          serviceAccountName: faso-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: pg-backup
              image: faso/backup-tools:latest
              command:
                - /bin/bash
                - -c
                - |
                  source /vault/secrets/s3-credentials
                  exec /scripts/pg-backup.sh full
              env:
                - name: PGHOST
                  value: "faso-postgres.faso-infra.svc.cluster.local"
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: "faso"
                - name: PGPASSWORD_FILE
                  value: "/vault/secrets/postgres-password"
                - name: BACKUP_ENCRYPTION_KEY_FILE
                  value: "/vault/secrets/encryption-key"
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: faso-backup-config
                      key: s3-bucket
                - name: S3_ENDPOINT
                  valueFrom:
                    configMapKeyRef:
                      name: faso-backup-config
                      key: s3-endpoint
                - name: PUSHGATEWAY_URL
                  value: "http://prometheus-pushgateway.faso-observability.svc.cluster.local:9091"
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
            - name: scripts
              configMap:
                name: faso-backup-scripts
                defaultMode: 0755
